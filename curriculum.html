는 모든 관계의 기본 원리입니다.","summary":""},{"no":10,"file":"10_요한계시록_생명의_길.md","title":"요한계시록 — 생명의 길","passage":"요한계시록 (개역개정)","verse":"요한계시록 21:4","core":"우리를 생명의 길로 인도하시는 분은 예수 그리스도밖에 없습니다.","summary":""},{"no":11,"file":"11_특강2_주님과_함께_현실을_직면하라.md","title":"특강 2 | 세계관에 기초한 설교 2 — 주님과 함께 현실을 직면하라","passage":"민수기 14:1-10 / 여호수아 14:7-12 (개역개정)","verse":"민수기 14:9","core":"우리의 삶은 세상의 스펙이 아니라 하나님께 달려 있습니다. 마음을 하나님께 드리고 현실을 직면하면, 주님이 그 인생을 책임지십니다.","summary":""}]}]},{"year":3,"quarters":[{"q":1,"lessons":[{"no":1,"file":"01_창조.md","title":"창조","passage":"창세기 1:26-31 (개역개정)","verse":"창세기 1:27","core":"사람은 하나님의 형상으로 지음 받은 존엄한 존재이며, 이 세상을 하나님의 뜻대로 다스리고 가꾸도록 부름 받았습니다.","summary":""},{"no":2,"file":"02_타락.md","title":"타락","passage":"창세기 3:1-7 (개역개정)","verse":"로마서 1:25","core":"죄의 본질은 하나님의 자리에 자기를 앉히는 것이며, 그 한 선택이 인간과 세상 전체를 깨뜨렸습니다.","summary":""},{"no":3,"file":"03_구속.md","title":"구속","passage":"로마서 3:21-26 (개역개정)","verse":"골로새서 1:13-14","core":"스스로는 죄에서 빠져나올 수 없는 우리를, 하나님이 예수님의 피라는 값을 치르고 도로 사서 의롭다 하시고 빛의 나라로 옮기셨습니다.","summary":""},{"no":4,"file":"04_정치.md","title":"정치","passage":"로마서 13:1-7 (개역개정)","verse":"미가 6:8","core":"모든 권세는 하나님께로부터 나왔으며, 권력은 군림이 아니라 공의를 행하라고 위임된 섬김입니다.","summary":""},{"no":5,"file":"05_경제.md","title":"경제","passage":"마태복음 25:14-30 (개역개정)","verse":"시편 24:1","core":"모든 소유의 주인은 하나님이시며, 우리는 맡은 것을 하나님 나라를 위해 운용하는 청지기입니다.","summary":""},{"no":6,"file":"06_교육.md","title":"교육","passage":"신명기 6:4-9 (개역개정)","verse":"잠언 1:7","core":"참된 교육은 성적이 아니라 하나님을 경외함에서 시작되며, 배움의 목적은 하나님과 이웃을 섬기는 것입니다.","summary":""},{"no":7,"file":"07_문화예술.md","title":"문화와 예술","passage":"빌립보서 4:8 (개역개정)","verse":"빌립보서 4:8","core":"하나님은 아름다움의 주인이시며, 그리스도인은 문화를 무조건 피하거나 무비판으로 삼키는 대신, 참되고 아름다운 것을 분별하며 누리고 만들어 갑니다.","summary":""},{"no":8,"file":"08_과학기술.md","title":"과학과 기술","passage":"창세기 11:1-9 (개역개정)","verse":"골로새서 1:17","core":"과학과 기술은 하나님의 형상인 인간에게 주어진 선한 능력이지만, '하나님처럼 되어 내 이름을 높이려는' 마음에 사로잡히면 바벨탑이 됩니다. 크리스천은 그 능력을 하나님과 이웃을 섬기는 데 씁니다.","summary":""},{"no":9,"file":"09_환경.md","title":"환경","passage":"로마서 8:19-23 (개역개정)","verse":"로마서 8:21","core":"자연이 신음하는 것은 인간의 죄가 남긴 상처이며, 창조 세계는 하나님의 자녀들과 함께 회복될 날을 기다립니다. 크리스천은 절망하지도 무책임하지도 않게, 그 회복의 미리 맛봄으로서 세상을 돌봅니다.","summary":""},{"no":10,"file":"10_미디어.md","title":"미디어","passage":"요한복음 8:31-32, 44 (개역개정)","verse":"요한복음 8:32","core":"'탈진실(post-truth)'의 시대에도 진리는 분명히 있습니다. 거짓은 사람을 가두지만, 예수님 안에 있는 진리는 사람을 자유롭게 합니다. 그러므로 미디어를 분별한다는 것은 결국 '진리 편에 서겠다'는 신앙의 선택입니다.","summary":""},{"no":11,"file":"11_특강.md","title":"특강 (절기·특강용 종합)","passage":"빌립보서 3:17-21 + 마태복음 5:13-16 (개역개정)","verse":"빌립보서 3:20","core":"우리의 시민권은 하늘에 있으며, 하늘 시민은 지금 여기에서 빛과 소금으로 삽니다.","summary":""}]},{"q":2,"lessons":[{"no":1,"file":"01_가정.md","title":"가정","passage":"시편 128:1-6 (개역개정)","verse":"시편 127:1","core":"가정은 가장 가까워서 가장 어렵기도 한 자리지만(느끼고), 그 참된 복은 형편이 아니라 여호와를 경외함 위에서 흐르며(알고), 나부터 한 걸음 먼저 그 집을 세워 갈 수 있습니다(행하고).","summary":""},{"no":2,"file":"02_부모자녀.md","title":"부모와 자녀","passage":"잠언 23:22-25 (개역개정)","verse":"출애굽기 20:12","core":"부모와 가장 자주 부딪히는 이 시기에도(느끼고), 공경은 무조건 복종이 아니라 하나님이 세우신 부모를 통해 진리를 전수받는 믿음의 통로임을 알고(알고), 생각이 달라도 존중을 잃지 않으며 작은 공경 하나를 오늘부터 실천합니다(행하고).","summary":""},{"no":3,"file":"03_형제자매.md","title":"형제자매","passage":"창세기 50:15-21 (개역개정)","verse":"시편 133:1","core":"하나님은 형제 사이의 미움과 상처까지 합력하여 선을 이루십니다(알기). 그 섭리를 신뢰할 때 복수를 내려놓는 자유와 평안을 누리며(느끼기), 형제자매를 평생의 동행으로 먼저 용서하고 품습니다(행하기).","summary":""},{"no":4,"file":"04_친구.md","title":"친구","passage":"요한복음 15:12-17 (개역개정)","verse":"잠언 17:17","core":"참된 우정은 이익이 아니라 사랑과 헌신 위에 세워지며, 예수님은 우리를 종이 아니라 친구라 부르십니다.","summary":""},{"no":5,"file":"05_교회.md","title":"교회","passage":"베드로전서 2:4-10 (개역개정)","verse":"베드로전서 2:9","core":"교회는 그리스도를 모퉁잇돌 삼아 우리가 산 돌로 함께 세워지는, 택하신 족속이요 하나님의 소유된 백성입니다.","summary":""},{"no":6,"file":"06_선생님제자.md","title":"스승과 제자","passage":"디모데후서 2:1-7 (개역개정)","verse":"디모데후서 2:2","core":"믿음은 한 세대에서 다음 세대로, 신실한 스승과 제자를 통해 흘러갑니다.","summary":""},{"no":7,"file":"07_이웃.md","title":"이웃","passage":"레위기 19:9-18 (개역개정)","verse":"마가복음 12:31","core":"이웃 사랑은 추상적 감정이 아니라, 약한 자의 몫을 남기고 공정하게 대하는 구체적 삶입니다.","summary":""},{"no":8,"file":"08_갈등과용서.md","title":"갈등과 용서","passage":"마태복음 5:23-24 · 골로새서 3:13 (개역개정)","verse":"마태복음 6:14-15","core":"우리가 받은 큰 용서를 기억하는 사람은, 먼저 화해를 청하고 형제의 잘못을 끝없이 용서합니다.","summary":""},{"no":9,"file":"09_약한자와강한자.md","title":"약한 자와 강한 자","passage":"로마서 15:1-7 (개역개정)","verse":"갈라디아서 6:2","core":"믿음이 강한 사람은 자기 만족이 아니라 약한 이웃의 짐을 함께 지며 그를 세우는 데 힘을 씁니다.","summary":""},{"no":10,"file":"10_다문화.md","title":"다문화","passage":"에베소서 2:11-22 (개역개정)","verse":"에베소서 2:19","core":"그리스도는 민족과 신분으로 갈린 막힌 담을 십자가로 허무시고, 우리를 한 가족·한 성전으로 지으십니다.","summary":""},{"no":11,"file":"11_종합_서로사랑하라.md","title":"종합: 서로 사랑하라","passage":"요한일서 4:7-21 (+ 요한복음 13:34-35) (개역개정)","verse":"요한복음 13:34-35","core":"하나님이 먼저 우리를 사랑하셨기에 우리도 서로 사랑하며, 사랑이 모든 관계를 완성합니다.","summary":""}]},{"q":3,"lessons":[{"no":1,"file":"01_겸손.md","title":"겸손","passage":"베드로전서 5:5-6 (개역개정)","verse":"베드로전서 5:6","core":"하나님은 교만한 자를 대적하시고 겸손한 자에게 은혜를 주시니, 참된 높아짐은 스스로 낮아지는 데서 시작됩니다.","summary":""},{"no":2,"file":"02_감사.md","title":"감사","passage":"시편 116:12-19 (개역개정)","verse":"시편 107:1","core":"감사는 좋은 일이 있어서가 아니라, 하나님이 베푸신 은혜를 기억하는 데서 흘러나옵니다.","summary":""},{"no":3,"file":"03_인내.md","title":"인내","passage":"히브리서 12:1-3 (개역개정)","verse":"히브리서 12:1","core":"믿음의 경주는 예수님을 바라보며 무거운 것을 내려놓고 끝까지 달리는 인내입니다.","summary":""},{"no":4,"file":"04_용기.md","title":"용기","passage":"신명기 31:6-8 (개역개정)","verse":"신명기 31:8","core":"용기는 두려움이 없는 게 아니라, 함께하시는 하나님을 믿고 두려움 앞에서 한 걸음 내딛는 것입니다.","summary":""},{"no":5,"file":"05_성실.md","title":"성실","passage":"누가복음 16:10-13 (개역개정)","verse":"누가복음 16:10","core":"지극히 작은 일에 충성하는 사람이 큰 일에도 충성하며, 우리는 두 주인이 아니라 하나님을 섬깁니다.","summary":""},{"no":6,"file":"06_긍휼.md","title":"긍휼","passage":"누가복음 7:11-17 (개역개정)","verse":"누가복음 6:36","core":"긍휼은 멀리서 동정하는 게 아니라, 우는 자 곁으로 다가가 그 슬픔을 함께 짊어지는 것입니다.","summary":""},{"no":7,"file":"07_절제.md","title":"절제","passage":"잠언 16:32 · 25:28 (개역개정)","verse":"잠언 16:32","core":"자기 마음을 다스리는 사람이 성을 빼앗는 용사보다 강하며, 절제는 성령이 주시는 열매입니다.","summary":""},{"no":8,"file":"08_기쁨.md","title":"기쁨","passage":"느헤미야 8:9-12 (개역개정)","verse":"느헤미야 8:10","core":"참된 기쁨은 형편에서 오는 게 아니라 여호와를 기뻐하는 데서 오며, 그 기쁨이 우리의 힘이 됩니다.","summary":""},{"no":9,"file":"09_평화.md","title":"평화","passage":"요한복음 14:25-27 (개역개정)","verse":"요한복음 14:27","core":"예수님이 주시는 평안은 환경이 잔잔해서가 아니라, 그분이 함께하시기에 누리는 마음의 평안입니다.","summary":""},{"no":10,"file":"10_소망.md","title":"소망","passage":"베드로전서 1:3-9 (개역개정)","verse":"로마서 15:13","core":"그리스도의 부활은 우리에게 시들지 않는 산 소망을 주어, 시련 중에도 흔들리지 않게 합니다.","summary":""},{"no":11,"file":"11_종합_성품.md","title":"종합: 성령이 빚으시는 성품","passage":"베드로후서 1:5-8 (개역개정)","verse":"베드로후서 1:8","core":"성품은 하루아침에 생기지 않고, 믿음 위에 한 걸음씩 더해 가며 성령이 빚으시는 열매입니다.","summary":""}]},{"q":4,"lessons":[{"no":1,"file":"01_부르심.md","title":"부르심","passage":"예레미야 1:4-10 (개역개정)","verse":"예레미야 1:5","core":"하나님은 우리가 태어나기도 전에 우리를 아시고 부르셨으며, \"나는 부족하다\"는 핑계를 넘어서게 하시는 그분의 함께하심이 부르심에 따라옵니다. (**알기** — 부르심은 내 자격이 아니라 먼저 아신 하나님께 근거함을 안다. **느끼기** — '쓸모로 매겨지지 않는 나'를 받아들이는 안도를 느낀다. **행하기** — \"함께하시는 하나님\"을 믿고 오늘의 자리에서 한 걸음 내딛는다.)","summary":""},{"no":2,"file":"02_은사.md","title":"은사","passage":"출애굽기 31:1-11 (개역개정)","verse":"출애굽기 31:3","core":"재능은 내가 만든 것이 아니라 하나님의 영이 주신 선물이며, 평범한 손재주까지도 하나님 나라를 짓는 데 쓰이는 거룩한 은사입니다.","summary":""},{"no":3,"file":"03_기도.md","title":"기도","passage":"누가복음 18:1-8 (개역개정)","verse":"누가복음 18:1","core":"기도는 응답이 더딜 때에도 낙심하지 않고 끝까지 하나님께 매달리는 것이며, 하나님은 끝까지 부르짖는 자를 외면하지 않으십니다.","summary":""},{"no":4,"file":"04_전도.md","title":"전도","passage":"로마서 10:13-17 (개역개정)","verse":"로마서 10:13","core":"누구든지 주의 이름을 부르는 자는 구원을 받지만, 듣지 못한 이는 부를 수 없기에, 복음은 전하는 사람의 입술을 통해 전해집니다.","summary":""},{"no":5,"file":"05_선교.md","title":"선교","passage":"사도행전 16:6-10 (개역개정)","verse":"마가복음 16:15","core":"선교는 내 계획대로가 아니라 하나님이 열고 닫으시는 길을 따라, 경계를 넘어 복음을 들고 가는 것입니다.","summary":""},{"no":6,"file":"06_헌신.md","title":"헌신","passage":"빌립보서 3:7-11 (개역개정)","verse":"갈라디아서 2:20","core":"헌신은 그리스도를 최고의 가치로 알기에, 자랑하던 것까지 기꺼이 내려놓고 그분을 택하는 삶입니다.","summary":""},{"no":7,"file":"07_고난.md","title":"고난","passage":"고린도후서 4:7-12 (개역개정)","verse":"고린도후서 4:17","core":"우리는 질그릇처럼 약하지만 그 안에 보배를 품었기에, 사방으로 눌려도 부서지지 않고 고난 중에 도리어 그리스도의 생명을 드러냅니다.","summary":""},{"no":8,"file":"08_증거.md","title":"증거","passage":"빌립보서 2:12-16 (개역개정)","verse":"빌립보서 2:15","core":"증거는 말솜씨가 아니라 원망과 다툼 없는 삶으로, 어두운 세상에서 빛처럼 드러나 복음을 보여 주는 것입니다.","summary":""},{"no":9,"file":"09_소망.md","title":"소망","passage":"요한계시록 21:1-7; 22:1-5 (개역개정)","verse":"요한계시록 21:5","core":"그리스도인의 소망은 막연한 내세가 아니라, 하나님이 모든 눈물을 닦으시고 만물을 새롭게 하실 '새 하늘과 새 땅'이라는 확실한 약속입니다.","summary":""},{"no":10,"file":"10_공동체.md","title":"공동체","passage":"사도행전 4:32-37 (개역개정)","verse":"사도행전 4:32","core":"믿음은 혼자 가는 길이 아니라 한마음으로 나누고 짊어지며 함께 걸어가는 공동체 안에서 자라갑니다.","summary":""},{"no":11,"file":"11_졸업.md","title":"졸업","passage":"여호수아 24:14-15 (개역개정)","verse":"여호수아 24:15","core":"3년의 배움은 지식이 아니라 결단으로 완성되며, \"오직 나와 내 집은 여호와를 섬기겠노라\"는 평생의 선택 앞에 우리를 세웁니다.","summary":""}]}]}]}]};

function motifFor(title,core){
  const t=(title||'')+' '+(core||'');
  for(const [re,m] of KEYMAP){ if(re.test(t)) return m; }
  return 'sprout';
}
function coverSVG(dm, L){
  // 일러스트 대기용 깔끔한 부서색 그라데이션 패널(추후 AI 이미지로 대체)
  const ang = 115 + (((L.no||1) * 27) % 70);
  const a10 = dm.accent + '1f';   // ~12% alpha
  return `<div class="cover" style="background:`+
    `radial-gradient(130% 105% at 26% 18%, #ffffff 0%, ${dm.bg} 62%, ${a10} 100%),`+
    `linear-gradient(${ang}deg, ${dm.bg} 0%, #ffffff 100%);background-blend-mode:soft-light"></div>`;
}
function coverNode(dm, L){
  // AI 이미지가 있으면 우선, 없으면 부서색 패널
  if(L.img){ return `<div class="cover"><img src="${L.img}" alt="" loading="lazy"></div>`; }
  return coverSVG(dm, L);
}

let CUR=1; // 기본 부서 초등부(index 1)
const $=(id)=>document.getElementById(id);

function buildTabs(){
  const bar=$('tabbar');
  bar.innerHTML=DEPT_META.map((dm,i)=>{
    const n=DATA.depts[i].years.reduce((a,y)=>a+y.quarters.reduce((b,q)=>b+q.lessons.length,0),0);
    return `<button class="tab ${dm.key}" role="tab" aria-selected="${i===CUR}" data-i="${i}" style="--d-accent:${dm.accent}">${dm.dept}<span class="n">${n}과</span></button>`;
  }).join('');
  bar.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{CUR=+b.dataset.i;render();});
}
function applyDeptVars(dm){
  const r=document.documentElement.style;
  r.setProperty('--dept',dm.accent); r.setProperty('--dept-deep',dm.deep);
  r.setProperty('--dept-bg',dm.bg); r.setProperty('--dept-line',dm.line);
}

        <div class="quarter">
          <div class="qhead"><span class="qbadge">${y.year}-${q.q}</span><h3>${q.q}분기</h3><span class="qn">${q.lessons.length}과</span></div>
          <div class="grid">
            ${q.lessons.map(L=>{L._id=(uid++); L._y=y.year; L._q=q.q; return cardHTML(dm,L);}).join('')}
          </div>
        </div>`).join('')}
    </section>`).join('');
  $('stage').innerHTML=html;
  // 카드 이벤트
  $('stage').querySelectorAll('.card').forEach(c=>{
    c.onclick=()=>openReader(CUR, findLesson(dep, +c.dataset.y, +c.dataset.q, +c.dataset.no));
  });
}
function cardHTML(dm,L){
  return `<button class="card" data-y="${L._y}" data-q="${L._q}" data-no="${L.no}">
    ${coverNode(dm,L)}
    <div class="cbody">
      <span class="cno">${L._y}-${L._q} · ${L.no}과</span>
      <div class="ctitle">${esc(L.title)}</div>
      <div class="cpass">${esc(L.passage||'—')}</div>
    </div></button>`;
}
function findLesson(dep,y,q,no){
  const yr=dep.years.find(Y=>Y.year===y); const qq=yr.quarters.find(Q=>Q.q===q);
  return qq.lessons.find(L=>L.no===no);
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- 전문 리더 ---------- */
const DEPTCACHE={};      // di -> {'y-q-no':{t,s}}
let RD={di:0,L:null,view:'s'};

async function loadDept(di){
  if(DEPTCACHE[di]) return DEPTCACHE[di];
  const r=await fetch(`data/dept${di}.json`);
  DEPTCACHE[di]=await r.json();
  return DEPTCACHE[di];
}
function openReader(di,L){
  const dm=DEPT_META[di]; applyDeptVars(dm);
  RD={di,L,view:'s'};
  $('rdHero').innerHTML=L.img?`<img src="${L.img}" alt="">`:coverSVG(dm,{...L,_id:'rd'}).replace('class="cover"','class="cover" style="height:100%;width:100%"');
  $('rdCrumb').textContent=`${dm.dept} · ${L._y}년차 ${L._q}분기 · ${L.no}과`;
  $('rdTitle').textContent=L.title;
  const rows=[['본문',L.passage],['외울말씀',L.verse],['핵심',L.core]].filter(r=>r[1]);
  $('rdFacts').innerHTML=rows.map(r=>`<div class="rf"><span class="lbl">${r[0]}</span><span class="val">${esc(r[1])}</span></div>`).join('');
  setView('s');
  $('rdBg').classList.add('on'); document.body.style.overflow='hidden'; $('reader').scrollTop=0; $('rdBg').scrollTop=0;
  $('rdContent').innerHTML=`<div class="rd-loading">불러오는 중…</div>`;
  loadDept(di).then(data=>{
    const rec=data[`${L._y}-${L._q}-${L.no}`];
    RD.rec=rec; renderContent();
  }).catch(()=>{ $('rdContent').innerHTML=`<div class="rd-loading">내용을 불러오지 못했습니다.</div>`; });
}
function setView(v){
  RD.view=v;
  $('tabStu').setAttribute('aria-pressed', v==='s'); $('tabTea').setAttribute('aria-pressed', v==='t');
  $('rdNote').textContent = v==='t'
    ? '교사용 — 오늘의 목적·교사 가이드·분별력·HOT토론 해설 포함 전문입니다.'
    : '학생용 — 학생이 대면하는 이야기·질문·활동 중심으로 정리했습니다.';
  if(RD.rec) renderContent();
}
function renderContent(){
  const rec=RD.rec;
  if(!rec){ $('rdContent').innerHTML=`<div class="rd-loading">준비 중인 과입니다.</div>`; return; }
  const html=rec[RD.view]||rec[RD.view==='s'?'t':'s']||'';
  $('rdContent').innerHTML=html||`<div class="rd-loading">표시할 내용이 없습니다.</div>`;
  document.querySelector('.rd-content').scrollTop=0;
  $('reader').parentElement.scrollTop=0;
}
$('tabStu').onclick=()=>setView('s');
$('tabTea').onclick=()=>setView('t');
function closeReader(){ $('rdBg').classList.remove('on'); document.body.style.overflow=''; }
$('rdBack').onclick=closeReader;
$('rdBg').addEventListener('click',e=>{ if(e.target===$('rdBg')) closeReader(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && $('rdBg').classList.contains('on')) closeReader(); });

render();
</script>
</body>
</html>
