<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>삶이 있는 신앙 — 전 과정 공과 지도</title>
<style>
  :root{
    --ink:#1f2a22; --ink-soft:#4a564d; --paper:#fafaf7; --line:#d9e0d8;
    --pine:#2f6b4f; --pine-deep:#24523d; --moss:#eef3ec;
    --amber:#b7791f; --amber-bg:#faf3e3;
    --indigo:#4a5899; --indigo-bg:#eceff8;
    --rose:#a3475b; --rose-bg:#f7ecef;
    --mono:"SF Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  a{color:var(--pine-deep)}
  header.hero{border-bottom:3px solid var(--pine);padding:48px 0 24px}
  .eyebrow{font-size:12px;letter-spacing:.18em;color:var(--pine);font-weight:700;text-transform:uppercase;margin:0 0 10px}
  .hero h1{font-size:clamp(26px,4.4vw,40px);line-height:1.18;margin:0 0 12px;letter-spacing:-.01em}
  .hero p.lede{color:var(--ink-soft);margin:0;max-width:46em;font-size:15.5px}
  .meta{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:16px;font-size:13px;color:var(--ink-soft)}
  .meta b{color:var(--ink)}
  .backlink{display:inline-block;margin-top:14px;font-size:13.5px;font-weight:600;text-decoration:none;
    color:var(--pine-deep);background:var(--moss);padding:6px 12px;border-radius:8px}

  /* 부서 탭 */
  nav.tabs{position:sticky;top:0;z-index:20;background:rgba(250,250,247,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);display:flex;gap:6px;flex-wrap:wrap;padding:10px 0}
  nav.tabs .wrap{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .tab{appearance:none;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);
    font-weight:700;font-size:14.5px;padding:9px 18px;border-radius:999px;cursor:pointer;transition:.15s;font-family:inherit}
  .tab:hover{border-color:var(--d-accent,#bbb)}
  .tab[aria-selected="true"]{color:#fff;border-color:transparent}
  .tab.d0[aria-selected="true"]{background:var(--amber)}
  .tab.d1[aria-selected="true"]{background:var(--pine)}
  .tab.d2[aria-selected="true"]{background:var(--indigo)}
  .tab.d3[aria-selected="true"]{background:var(--rose)}
  .tab .n{font-family:var(--mono);font-size:11.5px;opacity:.7;margin-left:7px;font-weight:600}

  main{padding:26px 0 80px}
  .yearblock{margin:0 0 34px}
  .yearhead{display:flex;align-items:baseline;gap:12px;margin:26px 0 4px;padding-bottom:8px;border-bottom:2px solid var(--dept-line)}
  .yearhead h2{font-size:21px;font-weight:800;margin:0;color:var(--dept-deep)}
  .yearhead .ytheme{font-size:13.5px;color:var(--ink-soft)}
  .quarter{margin:20px 0 8px}
  .qhead{display:flex;align-items:center;gap:10px;margin:0 0 12px}
  .qbadge{font-family:var(--mono);font-size:11.5px;font-weight:700;color:#fff;background:var(--dept);
    padding:3px 10px;border-radius:6px;letter-spacing:.02em}
  .qhead h3{font-size:15.5px;font-weight:700;margin:0;color:var(--dept-deep)}
  .qhead .qn{font-size:12.5px;color:var(--ink-soft);font-family:var(--mono)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(198px,1fr));gap:14px}
  .card{appearance:none;text-align:left;font-family:inherit;cursor:pointer;padding:0;overflow:hidden;
    background:#fff;border:1px solid var(--line);border-radius:14px;transition:.16s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(31,42,34,.13);border-color:var(--dept)}
  .card:focus-visible{outline:3px solid var(--dept);outline-offset:2px}
  .cover{aspect-ratio:1/1;width:100%;display:block;background:var(--dept-bg)}
  .cover img{width:100%;height:100%;object-fit:cover;display:block}
  .cbody{padding:11px 13px 13px}
  .cno{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--dept);letter-spacing:.03em}
  .ctitle{font-size:14px;font-weight:700;line-height:1.32;margin:3px 0 6px;color:var(--ink);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.6em}
  .cpass{font-size:11.5px;color:var(--ink-soft);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

  /* 리더(전문) */
  .rd-bg{position:fixed;inset:0;background:rgba(20,28,22,.5);backdrop-filter:blur(3px);
    display:none;align-items:flex-start;justify-content:center;z-index:60;padding:0;overflow-y:auto}
  .rd-bg.on{display:flex}
  .reader{background:#fff;width:100%;max-width:820px;min-height:100vh;box-shadow:0 0 60px rgba(0,0,0,.3);
    display:flex;flex-direction:column}
  .rd-top{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line);
    padding:14px 26px;display:flex;align-items:center;gap:14px}
  .rd-back{appearance:none;border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:7px 13px;
    font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;white-space:nowrap}
  .rd-back:hover{border-color:var(--dept);color:var(--dept)}
  .rd-toggle{margin-left:auto;display:inline-flex;background:var(--dept-bg);border-radius:10px;padding:3px}
  .rd-toggle button{appearance:none;border:none;background:transparent;font-family:inherit;font-weight:700;
    font-size:13.5px;color:var(--ink-soft);padding:7px 16px;border-radius:8px;cursor:pointer}
  .rd-toggle button[aria-pressed="true"]{background:#fff;color:var(--dept-deep);box-shadow:0 1px 4px rgba(0,0,0,.12)}
  .rd-hero{position:relative;aspect-ratio:21/9;background:var(--dept-bg);overflow:hidden}
  .rd-hero img{width:100%;height:100%;object-fit:cover;display:block}
  .rd-head{padding:22px 26px 6px}
  .rd-crumb{font-size:12px;font-weight:700;letter-spacing:.03em;color:var(--dept);margin:0 0 6px}
  .rd-head h1{font-size:clamp(21px,3.5vw,28px);font-weight:800;margin:0 0 14px;color:var(--ink);line-height:1.24}
  .rd-facts{display:flex;flex-direction:column;gap:0;margin:0 0 6px;border:1px solid var(--dept-line);border-radius:12px;overflow:hidden}
  .rd-facts .rf{display:flex;gap:12px;padding:10px 15px;font-size:14px;background:#fff}
  .rd-facts .rf+.rf{border-top:1px solid var(--dept-line)}
  .rd-facts .rf .lbl{flex:0 0 84px;color:var(--dept-deep);font-weight:700;font-size:12.5px}
  .rd-facts .rf .val{flex:1;color:var(--ink)}
  .rd-content{padding:16px 26px 60px;font-size:15.5px;line-height:1.72;color:var(--ink)}
  .rd-content .mod{padding:6px 0 4px;margin:0 0 6px}
  .rd-content .mod>h2{font-size:16px;font-weight:800;color:#fff;background:var(--dept);display:inline-block;
    padding:5px 14px;border-radius:8px;margin:26px 0 12px;letter-spacing:.01em}
  .rd-content h3{font-size:15.5px;font-weight:800;color:var(--dept-deep);margin:18px 0 6px}
  .rd-content h4{font-size:14.5px;font-weight:700;color:var(--ink);margin:14px 0 4px}
  .rd-content p{margin:0 0 11px}
  .rd-content ul,.rd-content ol{margin:0 0 12px;padding-left:22px}
  .rd-content li{margin:3px 0}
  .rd-content blockquote{margin:12px 0;padding:12px 16px;background:var(--dept-bg);
    border-left:4px solid var(--dept);border-radius:0 10px 10px 0;color:var(--ink)}
  .rd-content blockquote p:last-child{margin:0}
  .rd-content hr{border:none;border-top:1px dashed var(--dept-line);margin:20px 0}
  .rd-content .tw{overflow-x:auto;margin:12px 0;border:1px solid var(--line);border-radius:10px}
  .rd-content table{border-collapse:collapse;width:100%;font-size:14px}
  .rd-content th{background:var(--dept-bg);color:var(--dept-deep);text-align:left;padding:9px 13px;font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap}
  .rd-content td{padding:9px 13px;border-bottom:1px solid var(--line);vertical-align:top}
  .rd-content tr:last-child td{border-bottom:none}
  .rd-note{margin:6px 26px 0;font-size:11.5px;color:var(--ink-soft)}
  .rd-loading{padding:60px 26px;text-align:center;color:var(--ink-soft);font-size:14px}
  footer{border-top:1px solid var(--line);padding:26px 0 40px;color:var(--ink-soft);font-size:13px}
  @media (max-width:520px){ .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
    .rd-top,.rd-head,.rd-content{padding-left:16px;padding-right:16px} }
</style>
</head>

","core":"교회는 그리스도의 몸이며, 사랑으로 하나 되어 함께 자란다","summary":""},{"no":9,"file":"09_종말론-모든 것에는 마지막이 있다.md","title":"종말론 — 모든 것에는 마지막이 있다","passage":"마태복음 24:29~41","verse":"요한계시록 22:20 (개역개정)","core":"이 세상은 끝이 아니며, 예수님이 다시 오시고 심판이 있다","summary":""},{"no":10,"file":"10_헌금-진짜 헌금이란.md","title":"헌금 — 진짜 헌금이란","passage":"고린도후서 9:1~8","verse":"역대상 29:14 (개역개정)","core":"헌금은 하나님께 받은 것을 기쁜 마음으로 돌려 드리는 것이다","summary":""},{"no":11,"file":"11_특강-하나님이 만드신 가정.md","title":"특강 — 하나님이 만드신 가정","passage":"창세기 2:18~24","verse":"창세기 2:24 (개역개정)","core":"하나님은 사람이 서로 돕고 사랑하는 가정을 이루도록 지으셨다","summary":""}]},{"q":4,"lessons":[{"no":1,"file":"01_메시야 예언-왕이 오신데요.md","title":"메시야 예언 — 왕이 오신데요","passage":"스가랴 9:9~10","verse":"이사야 9:6 (개역개정)","core":"하나님께서는 자기 백성을 구원할 왕 같은 구원자(예수님)를 미리 약속하셨다","summary":""},{"no":2,"file":"02_탄생-살인미수에 그치다.md","title":"탄생 — 살인미수에 그치다","passage":"마태복음 2:1~12","verse":"시편 148:13 (개역개정)","core":"온 세상의 왕으로 오신 예수님을, 어떤 사람은 경배했고 어떤 사람은 미워했다","summary":""},{"no":3,"file":"03_어린시절-왕을 찬양하라.md","title":"어린시절 — 왕을 찬양하라","passage":"누가복음 2:25~33","verse":"이사야 43:21 (개역개정)","core":"왕으로 오신 예수님을 만난 시므온처럼, 우리도 예수님을 찬양해야 한다","summary":""},{"no":4,"file":"04_공생애 시작-왕의 능력.md","title":"공생애 시작 — 왕의 능력","passage":"요한복음 2:1~11","verse":"디모데전서 3:16 (개역개정)","core":"예수님의 첫 번째 표적은 물을 포도주로 바꾸신 일이며, 예수님은 우리와 세상을 변화시키는 왕이시다","summary":""},{"no":5,"file":"05_가르침-섬기는 왕도 있나요.md","title":"가르침 — 섬기는 왕도 있나요","passage":"요한복음 13:1~20, 마가복음 8:31","verse":"마태복음 20:28 (개역개정)","core":"왕으로 오신 예수님은 죽기까지 우리를 섬기고 사랑하셨다","summary":""},{"no":6,"file":"06_병고침-예수 하나님이 보내신 왕.md","title":"병고침 — 예수, 하나님이 보내신 왕","passage":"요한복음 4:31~34","verse":"요한복음 4:34 (개역개정)","core":"왕이신 예수님도 하나님의 보내심을 받아, 하나님의 뜻을 이루려 하셨다","summary":""},{"no":7,"file":"07_죽음-반역이 일어나다.md","title":"죽음 — 반역이 일어나다","passage":"요한복음 19:14~22","verse":"이사야 53:5 (개역개정)","core":"왕이신 예수님께서 우리를 위해 대신 죽임을 당하셨다","summary":""},{"no":8,"file":"08_부활-결정적 승리.md","title":"부활 — 결정적 승리","passage":"마태복음 28:1~10","verse":"요한복음 11:25 (개역개정)","core":"왕이신 예수님은 죽음의 권세를 누르고 부활하여 결정적 승리를 거두셨다","summary":""},{"no":9,"file":"09_재림-그때를 알 수 없는 왕의 귀환.md","title":"재림 — 그때를 알 수 없는 왕의 귀환","passage":"사도행전 1:1~11","verse":"요한계시록 22:20 (개역개정)","core":"부활하신 예수님은 반드시 다시 오시며, 우리는 그날을 기다리며 바르게 살아야 한다","summary":""},{"no":10,"file":"10_성품-경청.md","title":"성품 — 경청","passage":"마태복음 20:29~34","verse":"잠언 18:13 (개역개정)","core":"왕이신 예수님은 가장 낮고 약한 자의 말에도 귀 기울이셨다 (경청)","summary":""},{"no":11,"file":"11_특강-가짜 왕 주의보.md","title":"특강 — 가짜 왕 주의보 (이단 분별)","passage":"베드로후서 2:1, 디도서 3:10","verse":"디도서 3:10 (개역개정)","core":"이단은 우리와 비슷해 보이지만 예수님을 부인하며, 그 끝은 전혀 다르다. 우리는 진짜와 가짜를 분별해야 한다","summary":""}]}]},{"year":2,"quarters":[{"q":1,"lessons":[{"no":1,"file":"01_창조-예상치 못한 예정된 사랑.md","title":"구속사의 관점으로 보는 창조 — 예상치 못한, 예정된 사랑","passage":"에베소서 1:3~6","verse":"로마서 5:8 (개역개정)","core":"하나님께서는 세상을 만드시기 전부터 우리를 사랑으로 선택하고 계획하셨다","summary":"1분기 전체를 관통하는 키워드는 **예수님의 구원(구속)**입니다. 1~3과는 성경 전체를 '구속사'(구원의 역사)의 눈으로 봅니다. 1과는 그 출발점으로, 하나님께서 세상을 만드시기 **전부터** 우리를 향한 사랑의 계획을 세우셨다는 것을 배웁니다. 우리의 구원은 갑자기 생긴 일이 아니라, **하나님이 미리 준비하신 사랑**입니다."},{"no":2,"file":"02_타락-사랑을 악으로 갚다.md","title":"구속사의 관점으로 보는 타락 — 사랑을 악으로 갚다","passage":"창세기 1:31, 6:5~7","verse":"로마서 3:10 (개역개정)","core":"하나님의 사랑에도 불구하고, 사람은 죄로 세상을 더럽혔다","summary":"1과에서 하나님은 우리를 먼저 사랑하셨습니다. 2과는 그 사랑을 받은 사람이 어떻게 **죄로 사랑을 악으로 갚았는지**를 배웁니다. 하나님이 \"보시기에 심히 좋았던\" 세상(창 1:31)이, 사람의 죄로 인해 하나님이 한탄하실 만큼 망가졌습니다(창 6:5~7). 그래서 우리에게는 '구원'이 꼭 필요합니다."},{"no":3,"file":"03_구속-사랑은 여전히 사랑이어라.md","title":"구속사의 관점으로 보는 구속 — 사랑은 여전히 사랑이어라","passage":"요한일서 4:7~10","verse":"요한일서 4:10 (개역개정)","core":"하나님은 처음부터 끝까지 사랑이셔서, 우리를 구원하려 아들을 보내셨다","summary":"1과(창조)에서 하나님은 우리를 먼저 사랑하셨고, 2과(타락)에서 사람은 그 사랑을 죄로 갚았습니다. 그런데도 3과(구속)에서 하나님의 사랑은 **변하지 않았습니다**. 하나님은 우리 죄를 용서하시려고 아들 예수님을 화목 제물로 보내셨습니다(요일 4:10). 우리가 사랑할 만해서가 아니라, 하나님이 **사랑이시기** 때문입니다."},{"no":4,"file":"04_구속의 필요성-좋은 게 좋은 것이 아니다.md","title":"구속의 필요성 — 좋은 게 좋은 것이 아니다","passage":"신명기 8:1~10","verse":"로마서 6:23 (개역개정)","core":"하나님은 사랑하시기 때문에 때로 징계하시며, 그것이 우리에게 가장 좋은 것을 주는 방법이다","summary":"1~3과에서 하나님의 변함없는 사랑을 배웠습니다. 4과부터는 그 사랑이 왜 '구원'으로 이어져야 했는지를 배웁니다. 하나님은 사랑하시기에 이스라엘을 광야에서 **연단(징계)**하셨습니다(신 8장). 무조건 다 받아 주는 것이 사랑이 아니라, 때로 바로잡아 주시는 것이 더 큰 사랑입니다. 그래서 \"좋은 게 좋은 것\"이 아닙니다."},{"no":5,"file":"05_속죄1-왜 피를 흘려야 하나요.md","title":"속죄1 — 왜 피를 흘려야 하나요?","passage":"레위기 4:1~12","verse":"레위기 17:11 (개역개정)","core":"죄에는 반드시 대가가 따르며, 하나님은 예수님의 피로 우리 죄의 대가를 대신 치르셨다","summary":"4과에서 '죄의 삯은 사망'임을 배웠습니다. 5과는 그 죄의 대가를 어떻게 치르는지를 배웁니다. 구약 시대에 사람은 죄를 지으면 자기 대신 동물이 피를 흘려야 했습니다(레 4장). \"생명이 피에 있으므로 피가 죄를 속한다\"(레 17:11)는 것이지요. 이 모든 제사는 결국 **우리 대신 피 흘리신 예수님**을 가리킵니다."},{"no":6,"file":"06_속죄2-예수님의 피가 뭐길래.md","title":"속죄2 — 예수님의 피가 뭐길래","passage":"요한복음 1:1~5, 히브리서 9:9~14","verse":"요한일서 4:10 (개역개정)","core":"우리를 지으신 흠 없으신 예수님의 피만이 우리 죄를 영원히 깨끗하게 한다","summary":"5과에서 죄는 피로 속한다는 것을 배웠습니다. 6과는 **왜 하필 예수님의 피**여야 하는지를 배웁니다. 예수님은 곧 하나님이시며(요 1:1), 흠이 없으신 분(히 9:14)이세요. 그래서 염소·송아지의 피가 아니라 예수님 자신의 피로만 우리 죄가 영원히 깨끗해질 수 있습니다(히 9:12~14). 예수님의 보혈은 세상 그 무엇과도 비교할 수 없는 가치를 지닙니다."},{"no":7,"file":"07_속죄3-순종 그까이꺼.md","title":"속죄3 — 순종, 그게 뭐 어렵다고?","passage":"요한복음 6:38, 빌립보서 2:5~11, 이사야 53:4~6","verse":"갈라디아서 4:7 (개역개정)","core":"예수님은 우리를 위해 죽기까지 순종하셨고, 우리도 그 예수님을 따라 순종한다","summary":"5~6과에서 예수님의 보혈을 배웠습니다. 7과는 그 예수님이 **얼마나 깊이 순종**하셨는지를 배웁니다. 하나님이신 예수님이 사람이 되시고(빌 2:6~7), 우리를 위해 십자가에서 죽기까지 순종하셨습니다(빌 2:8). 그 순종 덕분에 우리는 종이 아니라 하나님의 아들·딸이 되었습니다(갈 4:7). 우리도 그 예수님을 따라 순종하며 삽니다."},{"no":8,"file":"08_구속1-문제아도 사랑하시나요.md","title":"구속1 — 문제아도 사랑하시나요?","passage":"요한복음 8:1~11, 마가복음 2:17","verse":"로마서 5:8 (개역개정)","core":"예수님은 우리를 정죄하러 오신 것이 아니라, 용서하고 살리러 오셨다","summary":"4~7과에서 죄와 속죄를 배웠습니다. 8과부터는 그 은혜가 **누구에게까지** 미치는지를 배웁니다. 사람들은 잘못한 사람을 정죄하지만, 예수님은 큰 잘못을 저지른 사람에게도 \"나도 너를 정죄하지 않는다. 가서 다시는 죄를 짓지 말라\"고 하셨습니다(요 8:11). 예수님은 죄인을 부르러 오신 의사 같은 분입니다(막 2:17)."},{"no":9,"file":"09_구속2-차고 넘치는 은혜.md","title":"구속2 — 차고 넘치는 은혜","passage":"출애굽기 17:1~7, 시편 105편, 고린도전서 10:4","verse":"에베소서 2:7 (개역개정)","core":"하나님의 은혜는 우리의 상상을 뛰어넘는, 차고 넘치는 풍성한 은혜다","summary":"8과에서 죄인을 사랑하시는 은혜를 배웠습니다. 9과는 그 은혜가 **얼마나 풍성한지**를 배웁니다. 이스라엘 백성이 광야에서 물이 없다고 불평할 때, 하나님은 반석에서 물을 터뜨려 차고 넘치게 주셨습니다(출 17, 시 105:41). 그 반석은 곧 예수님이세요(고전 10:4). 하나님의 은혜는 우리가 생각하는 것보다 늘 더 크고 풍성합니다."},{"no":10,"file":"10_구속3-끝까지 책임지는 사랑.md","title":"구속3 — 끝까지 책임지는 사랑","passage":"요한복음 21:1~14","verse":"창세기 28:15 (개역개정)","core":"사람의 사랑은 변하지만, 하나님의 사랑은 끝까지 변하지 않고 우리를 책임지신다","summary":"8~9과에서 풍성한 은혜를 배웠습니다. 10과는 그 사랑이 **끝까지 변하지 않는다**는 것을 배웁니다. 베드로는 예수님을 배신하고 도망쳤지만, 부활하신 예수님은 그를 다시 찾아오셨습니다(요 21장). 사람의 사랑은 기분과 형편에 따라 변하지만, 하나님의 사랑은 끝까지 우리를 책임지십니다(창 28:15)."},{"no":11,"file":"11_특강-QT 경건의 시간.md","title":"특강 — QT(경건의 시간)","passage":"잠언 28:9, 시편 1:1~2, 여호수아 1:8","verse":"사무엘하 22:29 (개역개정)","core":"날마다 하나님의 말씀을 읽고 묵상하는 것이 하나님과 친밀히 동행하는 길이다","summary":"1분기 마지막 특강은 **QT(경건의 시간)**를 다룹니다. QT는 'Quiet Time'의 줄임말로, 조용히 하나님의 말씀을 읽고 묵상하며 기도로 반응하는 시간이에요. 하나님의 자녀가 날마다 말씀을 양식으로 삼을 때, 하나님과 더 가까워지고 그 뜻을 따라 살게 됩니다(시 1:1~2, 수 1:8)."}]},{"q":2,"lessons":[{"no":1,"file":"01_신론1-하나님이 제일 쎄요.md","title":"신론1 — 하나님이 제일 쎄요?","passage":"열왕기하 25:8~12, 이사야 46:1~13, 다니엘 2:46~47, 에스라 1장","verse":"시편 74:16~17 (개역개정)","core":"세상의 어떤 강대국·왕·신도 모두 하나님 아래에 있다","summary":"2분기는 **구속사의 관점**으로 \"하나님이 어떤 분이신지(신론)\"부터 시작합니다. 이스라엘은 성전이 무너지고 바벨론에 포로로 끌려가는 큰 아픔을 겪었어요. 그때 사람들은 \"우리 하나님이 바벨론 신보다 약한 걸까?\" 의심했을지도 몰라요. 하지만 성경은 분명히 말합니다. 보이지 않는 하나님께서 이 세상 모든 나라와 왕을 다스리고 계시고, 결국 이스라엘을 다시 돌아오게 하셨어요(에스라 1장). **세상에서 제일 센 분은 하나님이세요.**"},{"no":2,"file":"02_신론2-하나님이 왜 그래요.md","title":"신론2 — 하나님이 왜 그래요?","passage":"이사야 48장","verse":"이사야 48:17 (개역개정)","core":"하나님이 주시는 어려움은 우리를 가장 좋은 길로 인도하시려는 사랑이다","summary":"1과에서 하나님은 세상에서 제일 크신 분이라고 배웠어요. 그런데 그렇게 크신 하나님이 왜 우리에게 힘든 일을 허락하실까요? 이스라엘은 포로로 끌려가는 아픔을 겪었지만, 하나님은 그 일을 통해 백성을 **가장 좋은 길로 인도**하려 하셨어요(사 48:17). 하나님이 주시는 어려움은 우리를 망치려는 게 아니라, 우리를 진짜 하나님의 자녀로 자라게 하시는 사랑이에요."},{"no":3,"file":"03_인간론1-나는 이제 바벨론 사람이에요.md","title":"인간론1 — 나는 이제 바벨론 사람이에요","passage":"다니엘 1:4~5, 느헤미야 5:1~13","verse":"시편 7:9 (개역개정)","core":"내 안에 하나님 말씀과 어긋난 '바벨론'을 닮은 부분이 있다면 끊어 내야 한다","summary":"이스라엘 사람들은 바벨론에 끌려가 그 나라의 교육과 문화를 배웠어요(단 1:4~5). 그러다 보니 어느새 하나님 백성답지 않은 모습, 곧 '바벨론 사람'을 닮은 모습이 생겼어요. 느헤미야 시대에도 백성끼리 서로 괴롭히는 일이 있었지요(느 5장). 우리도 예수님을 믿으면서, 마음속에 하나님 말씀과 전혀 다른 '바벨론'을 닮은 부분이 있을 수 있어요. 그런 부분은 **과감하게 끊어 내야** 해요."},{"no":4,"file":"04_인간론2-제사장이 왜 저주를 받아요.md","title":"인간론2 — 제사장이 왜 저주를 받아요?","passage":"말라기 2:1~9","verse":"고린도전서 10:11~12 (개역개정)","core":"직분이 있어도 제멋대로 살면 하나님께 징계를 받는다 — 우리는 하나님의 뜻대로 살아야 한다","summary":"제사장은 하나님 앞에서 가장 거룩하게 세워진 사람이었어요. 그런데 구약성경 맨 마지막 책인 말라기에서, 하나님은 그 제사장들을 꾸짖으시고 저주까지 말씀하세요(말 2:1~9). 왜일까요? 직분(맡은 자리)이 거룩하다고 해서, 그 사람이 저절로 거룩해지는 건 아니기 때문이에요. 직분이 있어도 제멋대로 살면 하나님께 징계를 받아요. 우리는 **내 뜻이 아니라 하나님의 뜻대로** 살려고 노력해야 해요."},{"no":5,"file":"05_기독론1-나랑 무슨 상관이에요.md","title":"기독론1 — 나랑 무슨 상관이에요?","passage":"마태복음 25:31~46","verse":"마태복음 25:40 (개역개정)","core":"예수님은 버림받고 소외된 사람을 찾아가 사랑하셨고, 우리도 그래야 한다","summary":"예수님이 다시 오시는 날, 왕이신 예수님은 사람들을 오른편과 왼편으로 나누세요(마 25:31~46). 그 기준은 놀랍게도 \"지극히 작은 자 하나에게 어떻게 했느냐\"였어요. 배고픈 사람, 아픈 사람, 외로운 사람—세상이 무관심하게 지나치는 그 사람들을 도운 것이 곧 예수님께 한 것이라고 하세요. 예수님은 늘 **소외된 사람을 찾아가** 사랑하셨고, 우리도 그렇게 살기를 원하세요."},{"no":6,"file":"06_기독론2-예수님이 무슨 힘이 있어요.md","title":"기독론2 — 예수님이 무슨 힘이 있어요?","passage":"마가복음 9:14~29","verse":"마가복음 9:23 (개역개정)","core":"우리는 연약해도, 예수님께는 불가능이 없으시다 — 그분을 믿음으로 모든 것을 할 수 있다","summary":"제자들도 고치지 못한 아이가 있었어요. 아버지는 절망 가운데 예수님께 \"할 수 있거든 도와달라\"고 했지요. 예수님은 \"할 수 있거든이 무슨 말이냐, 믿는 자에게는 능히 하지 못할 일이 없느니라\"라고 하시고, 아이를 고쳐 주셨어요(막 9:14~29). 우리는 약하고 부족해요. 하지만 **예수님께는 불가능이 없으세요.** 그 예수님을 믿을 때, 우리는 우리 힘으로는 안 되는 일도 해낼 수 있어요."},{"no":7,"file":"07_구원론-천국가면 땡.md","title":"구원론 — 천국가면 땡?","passage":"요한복음 17:1~17","verse":"요한복음 17:17 (개역개정)","core":"구원받은 우리는 천국만 바라보는 게 아니라, 진리(말씀)로 거룩해지며 살아야 한다","summary":"예수님을 믿으면 천국에 가요. 그런데 \"천국 티켓만 받으면 끝\"일까요? 예수님은 십자가를 앞두고 우리를 위해 기도하시며, \"그들을 진리로 거룩하게 하옵소서 아버지의 말씀은 진리니이다\"라고 하셨어요(요 17:17). 구원받은 사람은 그냥 천국만 기다리는 게 아니라, 말씀(진리)으로 점점 더 거룩해지며(성화) 예수님을 닮아 가야 해요. 군인이 군인답게 살아야 하듯, 하나님의 자녀는 자녀답게 살아야 해요."},{"no":8,"file":"08_교회론-교회에도 일꾼이 필요해요.md","title":"교회론 — 교회에도 일꾼이 필요해요","passage":"사도행전 6:1~6","verse":"마태복음 23:12 (개역개정)","core":"교회는 예수님의 몸이며, 그 몸을 섬기는 일꾼이 필요하다","summary":"초대교회에 사람이 많아지면서 돌봄이 필요한 사람들이 생겼어요. 그래서 교회는 믿음과 성령이 충만한 일곱 사람을 뽑아 섬기는 일을 맡겼어요(행 6:1~6). 교회는 건물이 아니라 **예수님의 몸**이고, 그 몸이 잘 움직이려면 섬기는 일꾼이 필요해요. 예수님은 섬김을 받으러 오신 게 아니라 섬기러 오셨고(막 10:45), 십자가에서 죽기까지 섬기셨어요. 그 예수님이 머리 되신 교회에서, 우리도 섬기는 사람이 되어야 해요."},{"no":9,"file":"09_종말론-벼락치기가 통할까.md","title":"종말론 — 벼락치기가 통할까?","passage":"마태복음 25:1~13 (열 처녀 비유)","verse":"마태복음 25:13 (개역개정)","core":"그때를 알 수 없는 마지막 날을 늘 준비하며, 날마다 하나님 앞에서 살아야 한다","summary":"시험 날짜를 모른 채 갑자기 시험을 본다면 '벼락치기'는 통하지 않겠지요. 예수님이 다시 오시는 날(종말)도 그래요. 예수님은 천국을 열 처녀에 비유하셨어요. 미련한 다섯 처녀는 기름을 미리 준비하지 않았다가, 신랑이 갑자기 왔을 때 마지막에 '벼락치기'로 기름을 채우려 했지만 이미 늦었어요(마 25:8~10). 기름은 남에게 빌릴 수도, 급히 살 수도 없었지요. 예수님은 \"깨어 있으라, 그 날과 그 때는 아무도 모른다\"고 하셨어요(마 25:13). 그러니 우리는 **하루하루를 하나님 앞에서** 살며 늘 준비해야 해요."},{"no":10,"file":"10_특강-예수님의 경청.md","title":"특강 — 예수님의 경청","passage":"마가복음 14:32~42, 누가복음 22:39~46","verse":"요한일서 4:10 (개역개정)","core":"예수님의 기도는 하나님의 말씀을 듣고 그 뜻을 구하는 '경청의 기도'였다","summary":"기도는 내가 원하는 것을 쏟아 내는 시간이기만 할까요? 예수님은 십자가를 앞둔 겟세마네 동산에서 기도하시며 \"내 원대로 마시옵고 아버지의 원대로 하옵소서\"라고 하셨어요(막 14:36). 예수님의 기도는 내 뜻을 관철하는 기도가 아니라, **하나님의 말씀을 듣고 그 뜻을 구하는 '경청의 기도'**였어요. 우리도 기도할 때, 말하기만 하는 게 아니라 하나님의 뜻에 귀 기울이는 사람이 되어야 해요."},{"no":11,"file":"11_가정의 달-부모님을 공경해요.md","title":"가정의 달 — 부모님을 공경해요","passage":"에베소서 6:1~3","verse":"에베소서 6:1 (개역개정)","core":"하나님은 부모님께 순종하고 공경하라 명하셨고, 그렇게 사는 자녀에게 복을 약속하셨다","summary":"5월은 가정의 달이에요. 바울은 자녀에게 \"주 안에서 너희 부모에게 순종하라\"고 했고(엡 6:1), \"네 부모를 공경하라\"고 했어요(엡 6:2). 부모를 공경하는 것은 **약속이 있는 첫 계명**이에요(엡 6:2~3). 하나님은 세상의 많은 부모 중에서 나에게 꼭 맞는 부모님을 골라 보내 주셨어요. 그 부모님께 순종하고 공경하며 살 때, 하나님이 우리를 지켜 주시고 복을 주세요."}]},{"q":3,"lessons":[{"no":1,"file":"01_족장시대-확실한 약속.md","title":"족장시대 — 확실한 약속","passage":"창세기 1~50장 (창조·타락·족장 이야기)","verse":"히브리서 6:13 (개역개정)","core":"인간의 타락으로 세상이 더럽혀졌지만, 하나님께서는 반드시 이루실 구원을 다시 약속하셨다","summary":"3분기 전체를 관통하는 키워드는 **약속**입니다. 구약성경 전체를, 인간을 향한 하나님의 **약속**과 그 약속을 믿는 사람들의 삶이라는 눈으로 살펴봅니다. 1과는 그 시작인 **족장시대**(창세기)입니다. 하나님이 세상을 아름답게 만드셨지만 사람의 죄로 세상이 더럽혀졌어요. 그런데도 하나님은 그 자리에서 **구원을 다시 약속**하시고, 아브라함·이삭·야곱·요셉을 통해 그 약속을 차근차근 이루어 가십니다."},{"no":2,"file":"02_출애굽 시대-약속의 짝사랑.md","title":"출애굽 시대 — 약속의 짝사랑","passage":"출애굽기·레위기·민수기·신명기","verse":"요한복음 13:1 (개역개정)","core":"백성이 원망하고 등을 돌려도, 하나님께서는 끝까지 사랑하며 약속을 지키신다","summary":"2과는 **출애굽 시대**입니다. 하나님은 약속하신 대로 노예였던 이스라엘 백성을 애굽에서 구해 내시고, 시내산에서 언약을 맺으셨어요. 그런데 백성은 광야에서 자꾸 원망하고 불평하며 하나님께 등을 돌려요. 마치 한쪽만 좋아하는 **짝사랑**처럼 보이지요. 하지만 하나님은 그런 백성을 **끝까지** 사랑하시고 약속을 지키십니다."},{"no":3,"file":"03_사사시대-약속상실의 시대.md","title":"사사시대 — 약속을 잃어버린 시대","passage":"여호수아·사사기·룻기","verse":"시편 1:1~2 (개역개정)","core":"하나님의 말씀(약속)을 기준으로 삼지 않고 자기 마음대로 살면, 삶이 어지러워진다","summary":"3과는 **사사시대**입니다. 여호수아가 약속의 땅을 정복한 뒤, 백성은 점점 하나님의 약속(말씀)을 잊어버려요. 사사기는 이 시대를 한마디로 **\"각자 자기 소견에 옳은 대로 행하였다\"**(삿 17:6, 21:25)고 말해요. 기준인 하나님 말씀을 버리고 자기 마음대로 사니, 삶이 어지러워지고 무너졌어요."},{"no":4,"file":"04_통일왕국-깨어진 약속의 회복.md","title":"통일왕국 — 깨어진 약속의 회복","passage":"사무엘상·사무엘하·역대상","verse":"사무엘하 12:25 (개역개정)","core":"왕들이 죄를 지어 약속이 깨어져도, 하나님께서는 회개를 받으시고 약속을 더 굳게 세우신다","summary":"4과는 **통일왕국 시대**입니다. 하나님은 백성의 요청에 사울·다윗·솔로몬 같은 왕을 세우셨어요. 그런데 왕들도 하나님 앞에서 죄를 지어요. 다윗조차 큰 잘못을 했지요. 하지만 다윗이 진심으로 **회개**하자, 하나님은 그를 용서하시고 다윗의 후손을 통해 영원한 나라를 세우겠다는 약속을 더 **굳게** 하셨어요(삼하 7장). 깨어진 약속을 하나님이 회복시키신 거예요."},{"no":5,"file":"05_분열왕국-우왕좌왕.md","title":"분열왕국 — 우왕좌왕(右王左王)","passage":"열왕기상·열왕기하·역대하","verse":"열왕기하 17:37 (개역개정)","core":"하나님 '도' 섬기고 다른 신 '도' 섬기는 두 마음은 결국 무너진다 — 하나님 '만' 섬겨야 한다","summary":"5과는 **분열왕국 시대**입니다. 솔로몬 이후 나라가 북 이스라엘과 남 유다로 갈라졌어요. 많은 왕들이 하나님 '도' 섬기고 우상 '도' 섬기는 **두 마음**으로 우왕좌왕하다가, 결국 나라가 앗수르와 바벨론에게 멸망하고 말아요. 제목 '우왕좌왕(右王左王)'은 이리저리 흔들리는 모습을 뜻해요. 하나님은 우리가 하나님 '도'가 아니라 하나님 '만' 섬기기를 원하세요."},{"no":6,"file":"06_선지자1-약속파기 경보.md","title":"선지자1(포로 전 시대) — 약속파기 경보","passage":"이사야·예레미야·호세아 등 포로 전 선지서","verse":"역대하 24:19 (개역개정)","core":"하나님께서는 심판하시기 전에 선지자를 보내, 돌아오라고 사랑의 '경고'를 주신다","summary":"6과는 **포로 전 선지자 시대**입니다. 이스라엘과 유다가 하나님을 버리고 우상을 섬기자, 하나님은 곧바로 심판하지 않으시고 먼저 **선지자**를 보내셨어요. \"이대로 가면 위험해. 약속으로 돌아오너라!\"라는 **경고**를 주신 거예요. 이 경고는 벌주려는 것이 아니라, 백성을 살리려는 **사랑의 경보**였어요."},{"no":7,"file":"07_선지자2-약속을 믿고 기다림.md","title":"선지자2(포로 시대) — 약속을 믿고 기다림","passage":"예레미야·에스겔·다니엘","verse":"시편 130:5 (개역개정)","core":"하나님의 약속을 믿는 사람은, 힘든 포로 시대에도 흔들리지 않고 끝까지 인내하며 기다린다","summary":"7과는 **포로 시대**입니다. 나라가 망하고 백성이 바벨론에 포로로 끌려간 어두운 시대예요. 그런데 다니엘과 친구들은 그 낯선 땅에서도 바벨론 문화에 물들지 않고, 하나님의 말씀을 끝까지 지켰어요. 하나님이 \"70년 후에 반드시 회복시키겠다\"고 하신 **약속을 믿고 기다렸기** 때문이에요. 약속을 믿는 사람은, 힘든 시간도 인내하며 견뎌요."},{"no":8,"file":"08_선지자3-이제는 우리가 지킬 차례.md","title":"선지자3(포로 귀환) — 이제는 우리가 지킬 차례","passage":"에스라·느헤미야·에스더·학개·스가랴·말라기","verse":"이사야 56:1 (개역개정)","core":"하나님은 약속대로 백성을 돌려보내셨다 — 이제는 우리가 겉과 속이 같은 참된 예배로 응답할 차례다","summary":"8과는 **포로 귀환 시대**입니다. 하나님은 약속하신 대로 70년 만에 백성을 고향으로 돌려보내셨어요(스 1:1~4). 그런데 돌아온 백성은 여전히 죄를 짓고, 겉으로만 드리는 거짓 예배를 드렸어요. 하나님이 먼저 약속을 지키셨으니, **이제는 우리가** 겉과 속이 같은 참된 예배로 응답할 **차례**예요."},{"no":9,"file":"09_새언약-이제는 더 큰 약속을.md","title":"새언약 — 이제는 더 큰 약속을","passage":"이사야·예레미야·에스겔 (새언약 예언)","verse":"예레미야 31:33 (개역개정)","core":"옛 약속을 지키지 못하는 우리를 위해, 하나님은 마음에 법을 새기는 '새언약'을 약속하셨다","summary":"9과는 **새언약**입니다. 지금까지 이스라엘은 하나님과 여러 번 약속(언약)을 맺었지만, 번번이 지키지 못했어요. 그래서 하나님은 더 크고 완전한 **새언약**을 약속하셨어요. 옛 약속은 돌판에 새겼지만, 새언약은 **우리 마음속에** 법을 새겨 주시는 약속이에요(렘 31:33). 이 새언약은 예수님을 통해, 그리고 우리 마음에 오신 성령님을 통해 이루어져요."},{"no":10,"file":"10_시가서-약속을 노래하다.md","title":"시가서 — 약속을 노래하다 (Song of Testament)","passage":"욥기·시편·잠언·전도서·아가","verse":"시편 111:9 (개역개정)","core":"시가서의 저자들은 힘든 상황 속에서도, 변하지 않는 하나님의 약속을 바라보며 노래했다","summary":"10과는 **시가서**(욥기·시편·잠언·전도서·아가)입니다. 시가서는 어떤 상황에서도 하나님과 그 약속을 믿으며 부른 **노래**예요. 욥은 큰 고난 중에도, 다윗은 쫓기는 위험 중에도 하나님을 찬양했어요. 그들은 자기 기분이나 형편이 아니라, **변하지 않는 하나님의 약속**을 바라보며 노래했어요. 찬양은 약속을 믿음으로 고백하는 '곡조 있는 기도'예요."},{"no":11,"file":"11_특강-성경지리 이야기는 계속된다.md","title":"특강 — 성경 지리 이야기는 계속된다","passage":"여호수아 14:6~15","verse":"여호수아 14:9 (개역개정)","core":"하나님과 사람의 약속 이야기는 실제 땅 위에서 이루어지며, 하나님의 백성이 가는 곳은 어디나 하나님의 무대가 된다","summary":"3분기 마지막 특강은 **성경 지리**입니다. 성경은 하늘 위 이야기가 아니라, **실제 땅 위에서** 일어난 하나님과 사람의 약속 이야기예요. 하란·홍해·시내산·벧엘·바벨론·요단강·헤브론 같은 진짜 장소에서 약속이 이루어졌어요. 그리고 그 이야기는 오늘 한국에 사는 **나에게까지** 이어졌어요. 하나님의 백성이 가는 곳은, 어디든 하나님이 일하시는 **무대**가 됩니다."}]},{"q":4,"lessons":[{"no":1,"file":"01_공관복음-내가 안다.md","title":"공관복음 — 내가 안다","passage":"마태복음·마가복음·누가복음 (마 1:25, 8:24, 9:36, 11:28, 눅 2:1~20, 막 4:38, 요 4:6, 골 2:9 등)","verse":"이사야 53:5 (개역개정)","core":"약속대로 오신 예수님은 우리와 똑같은 사람이 되셔서, 우리의 아픔과 어려움을 다 아신다","summary":"4분기에는 **신약 성경 전체**를 \"약속\"의 관점으로 살펴봅니다. 그 첫째 과는 **공관복음**(마태·마가·누가)이에요. 세 복음서는 한 분 예수님을 조금씩 다른 모습으로 보여 줍니다. 마태복음은 \"왕으로 오신 예수님\", 마가복음은 \"섬기는 종으로 오신 예수님\", 누가복음은 \"사람(인자)으로 오신 예수님\"을 기록했어요. 놀랍게도 하나님과 똑같이 크신 예수님(골 2:9)께서, 우리처럼 아기로 태어나시고(눅 2장), 우시고 피곤해하시고 주무셨어요(막 4:38). 그래서 예수님은 우리의 아픔을 **누구보다 잘 아시는** 분이세요(히 4:15)."},{"no":2,"file":"02_요한복음-생명으로 지킨 약속.md","title":"요한복음 — 생명으로 지킨 약속","passage":"요한복음 (요 1:1~3, 3:1~21, 3:16, 4:1~26, 19:30 등)","verse":"요한복음 15:13 (개역개정)","core":"태초부터 계신 하나님이신 예수님이 우리를 위해 사람이 되시고, 생명을 내어주셔서 약속을 지키셨다","summary":"요한복음은 부활 이후의 깊은 눈으로 예수님을 바라봅니다. 예수님은 **태초부터 계신 하나님**이시며(요 1:1~3), 하나님의 아들이세요. 그분이 사람이 되어 오셔서(성육신) 하나님을 우리에게 알려 주셨고, 십자가에서 자기 생명을 모든 사람을 위해 내어주셨어요. 마지막에 \"다 이루었다\"(요 19:30) 하시며 약속을 끝까지 지키셨지요. 예수님은 **섬김으로** 우리를 사랑하셨고, 우리도 그 사랑을 따라 다른 사람을 섬기며 살아야 해요."},{"no":3,"file":"03_사도행전-약속대로 성령님이 오셨으니.md","title":"사도행전 — 약속대로 성령님이 오셨으니","passage":"사도행전 (행 1:8, 2:1~4, 8장, 9장, 10장, 13~14장 등 / 욜 2:28, 요 16:7)","verse":"사도행전 2:4 (개역개정)","core":"예수님이 약속하신 성령님이 오셔서, 하나님의 백성을 이끌어 복음을 온 세계로 퍼지게 하셨다","summary":"예수님은 떠나시기 전에 \"내가 떠나는 것이 너희에게 더 좋다\"(요 16:7)고 하시며 성령님을 보내 주시겠다고 약속하셨어요. 약속대로 오순절에 성령님이 임하셨고(행 2:1~4), 제자들은 완전히 변했어요. 두려워 숨던 사람들이 담대하게 복음을 전했고, 핍박으로 흩어졌지만 오히려 복음이 온 세계로 퍼져 나갔어요. 사도행전은 **예수님이 약속하신 성령님이 하나님의 백성을 이끌어 가시는 이야기**예요."},{"no":4,"file":"04_로마서 갈라디아서-더 높은 자유를 향해.md","title":"로마서·갈라디아서 — 더 높은 자유를 향해","passage":"로마서·갈라디아서 (롬 8:21, 8:33~39, 13:14 / 갈 5:1, 5:13~26)","verse":"갈라디아서 5:13 (개역개정)","core":"예수님이 주신 자유는 마음대로 하는 자유가 아니라, 하나님의 뜻대로 살며 이웃을 사랑하는 더 높은 자유다","summary":"로마서는 하나님의 구원으로 **새로운 삶(자유)**을 얻은 그리스도인의 삶을 이야기하고, 갈라디아서는 율법이 아니라 오직 예수님을 믿음으로 얻는 의(義)와 자유를 알려 줘요. 그런데 이 자유는 \"내 마음대로 다 할 수 있는\" 자유가 아니에요. **하나님의 말씀대로 살 때 누리는, 더 높은 자유**예요. 진짜 자유로운 사람은 그 자유를 사랑으로 사용해서, 이웃을 내 몸같이 사랑해요(갈 5:13~14)."},{"no":5,"file":"05_목회서신-어리다고 놀리지 말아요.md","title":"목회서신 — 어리다고 놀리지 말아요","passage":"디모데전후서·디도서 (딤전 1:1~2, 4:6~16, 4:12, 6:5~10 / 딤후 1:8~9, 4:6~8 / 딛 1:1~4, 2:11~15)","verse":"디모데전서 4:12 (개역개정)","core":"나이가 어려도 하나님의 약속을 믿고 바르게 살면, 믿는 사람들에게 본이 될 수 있다","summary":"바울은 에베소 등 여러 교회를 돌보던 젊은 목회자 **디모데**와, 그레데에서 사역하던 동역자 **디도**에게 편지를 썼어요. 바울은 자신을 사도로 세우신 분이 하나님이심을 분명히 하고(딤전 1:1~2), 복음을 위해 고난받는 것을 부끄러워하지 말라고 했어요(딤후 1:8~9). 특히 디모데가 **어리다는 이유로 무시당하지 않도록**, \"말과 행실과 사랑과 믿음과 정절에서 본이 되라\"(딤전 4:12)고 격려했지요. 어려도, 하나님의 말씀대로 살면 많은 사람에게 본이 될 수 있어요."},{"no":6,"file":"06_고린도 데살로니가서-선물도 약속대로 써야지.md","title":"고린도전후서·데살로니가전후서 — 선물도 약속대로 써야지","passage":"고린도전후서·데살로니가전후서 (고전 1:10~4:21, 6:13, 15:1~58 / 고후 5:11~21, 6:1~7:4 / 살전 4:1~12 / 살후 2:1~12, 3:6~15)","verse":"고린도전서 6:13 (개역개정)","core":"하나님이 선물로 주신 은사·재능은, 내 마음대로가 아니라 하나님의 뜻대로 사용할 때 참된 의미가 있다","summary":"고린도는 크고 부유한 항구 도시였지만 우상 숭배와 도덕적 문제가 많았고, 고린도 교회도 그 영향을 받았어요. 바울은 고린도 교회의 잘못을 바로잡고 말씀과 믿음 위에 굳게 서도록 고린도전후서를 썼어요. 데살로니가전후서는 그 교회 성도들을 칭찬하고 격려하는 편지예요. 핵심은 이거예요. 교회는 문제를 **사람 생각이 아니라 하나님 말씀을 기준으로** 풀어야 하고, 하나님이 주신 선물(은사·재능)은 **하나님의 뜻대로** 사용해야 한다는 것!"},{"no":7,"file":"07_옥중서신-하나 됨의 약속.md","title":"옥중서신 — 하나 됨의 약속","passage":"에베소서·빌립보서·골로새서·빌레몬서 (엡 1장, 2:11~22, 2:14 / 골 2:4, 8, 20~22 / 몬 1:1, 10, 16)","verse":"에베소서 2:14 (개역개정)","core":"서로 다른 사람들도 예수님 안에서 하나가 될 수 있으며, 우리는 내 욕심이 아니라 예수님의 말씀을 따라 관계를 맺어야 한다","summary":"바울이 감옥에서 쓴 편지를 '옥중서신'이라고 해요. **에베소서**는 그리스도의 몸인 교회와 성도의 관계를, **빌립보서**는 교회의 기쁨을, **골로새서**는 교회의 머리 되신 그리스도와의 연합을, **빌레몬서**는 종과 주인이 주님 안에서 하나 됨을 전해요. 핵심은 이거예요. 서로 너무 다른 사람들(유대인과 이방인, 종과 주인)도 **예수님 안에서 하나**가 될 수 있다는 것! 우리도 내 욕심이 아니라 예수님의 말씀을 따라 친구를 사귀고 관계를 맺어야 해요."},{"no":8,"file":"08_일반서신1-보여준 약속의 사람들.md","title":"일반서신1 — 보여준 약속의 사람들","passage":"히브리서·야고보서·베드로전후서 (히 11장, 1:1~14, 2:5~18 / 약 1:22~27, 2:14~26 / 벧전 1:3~12, 1:15, 1:23 / 벧후 1:12~15)","verse":"야고보서 2:17 (개역개정)","core":"믿음의 선조들은 고난 속에서도 약속을 믿었고, 그 믿음은 눈에 보이는 행동(행함)으로 드러났다","summary":"**히브리서**는 예수님의 완전하심과 뛰어나심을 믿음으로 따라간 선조들의 이야기를(특히 11장), **야고보서**는 \"행함이 있는 믿음\"을, **베드로전후서**는 그리스도인이 끝까지 믿음으로 승리하도록 격려하는 편지예요. 핵심은 이거예요. 믿음의 선조들은 어려움 속에서도 하나님의 약속을 믿었고, 그 믿음은 **말로만이 아니라 눈에 보이는 행동**으로 드러났다는 것! 행함이 없는 믿음은 죽은 믿음이에요(약 2:17)."},{"no":9,"file":"09_일반서신2-사랑으로 1등하자.md","title":"일반서신2 — 사랑으로 1등하자","passage":"요한1·2·3서·유다서 (요일 1:6~7, 2:5, 2:8~11, 2:15~16, 3:13~24, 5:3 / 요이 1:4, 6 / 요삼 1:2~4, 11 / 유 1:1)","verse":"요한일서 5:3 (개역개정)","core":"하나님이 말씀하시는 사랑은 진리를 사랑하고 거짓을 미워하는 사랑이며, 단순한 고백을 넘어선 자기희생이다","summary":"**요한1서**는 사랑이 단순한 말이 아니라 **자기희생**임을 말하고, **요한2·3서와 유다서**는 사랑이란 **거짓을 미워하고 진리를 사랑하는 것**이라고 가르쳐요. 세상이 말하는 사랑과 하나님이 말씀하시는 사랑은 달라요. 세상은 끼리끼리, 기분 좋을 때만 사랑하지만, 하나님의 사랑은 진리 안에서 자기를 내어주는 사랑이에요. 우리, 그 사랑으로 1등 해 봐요!"},{"no":10,"file":"10_요한계시록-약속은 이루어진다.md","title":"요한계시록 — 꿈? 아니. 약속은 이루어진다","passage":"요한계시록 (계 1:10~20, 2장, 2:25~26, 5:6·9, 18:14, 19:6~21, 21:2~8 등)","verse":"요한계시록 2:25~26 (개역개정)","core":"세상의 끝과 결과는 하나님께 있으며, 끝까지 믿음을 지킨 사람에게 하나님은 약속대로 큰 상을 주신다","summary":"요한계시록은 어려운 상황에 있던 성도들에게 \"세상의 끝과 결과는 하나님께 있다\"는 것을 확인시켜 주는 책이에요. 사도 요한은, 고난이 오더라도 영원한 희망을 잃지 말라고 권하며, 이 세상의 끝이 곧 **새로운 시작**임을 확신하게 해요. 끝까지 믿음의 싸움을 지킨 사람에게 하나님은 약속대로 큰 상을 주세요. 그 상은 세상의 어떤 것과도 비교할 수 없어요!"},{"no":11,"file":"11_특강-우리가 기다리는 것은.md","title":"특강 — 우리가 기다리는 것은? (성탄 특강)","passage":"마태복음 1:21, 2:13 / 마가복음 15:15 / 요한복음 1:1~5, 3:16, 14:9 / 요한일서 5:5, 13 (롬 3:23)","verse":"마태복음 1:21 (개역개정)","core":"창조주 하나님이 우리를 살리려 사람으로 오셨지만 환영받지 못하셨다. 우리는 예수님이 오신 이유를 기억하며 성탄을 기다려야 한다","summary":"이번 특강은 **성탄(크리스마스)**에 대한 과예요. 우리와 똑같이 아기로 태어나신 예수님은 사실 누구실까요? 바로 태초부터 계신 **하나님**이세요(요 1:1, 14:9). 그런데 창조주 하나님(예수님)이 우리를 살리려고 이 땅에 오셨을 때, 모든 사람이 기뻐하며 환영하지는 않았어요. 우리는 크리스마스에 선물이나 다른 것보다, **예수님이 오신 이유**를 먼저 기억하며 그분을 기다려야 해요."}]}]},{"year":3,"quarters":[{"q":1,"lessons":[{"no":1,"file":"1과_창조-완벽한 나라.md","title":"창조 — 완벽한 나라 (하나님의 다스림을 받는 나라)","passage":"창세기 1:2-4, 창세기 2:1-3, 창세기 3:1","verse":"창세기 2:3 (개역개정)","core":"하나님 나라: 창조의 완벽함 속에서 안식의 의미 발견하기","summary":""},{"no":2,"file":"2과_타락-나만 생각했다가.md","title":"타락 — 나만 생각했다가 (욕심과 공동체의 균열)","passage":"여호수아 6장, 여호수아 7장, 마태복음 26:14-16, 마태복음 26:47-50","verse":"로마서 8:22 (개역개정)","core":"하나님 나라: 욕심의 결과는 개인만이 아니라 공동체 전체에 영향을 미침","summary":""},{"no":3,"file":"3과_구속-나로부터 시작되리.md","title":"구속 — 나로부터 시작되리~!","passage":"창세기 4:1-5 (가인과 아벨의 제사), 히브리서 11:4, 요한복음 1:1-5·14","verse":"베드로전서 2:9 (개역개정)","core":"예수님의 구속 사역과 우리 삶의 목적","summary":""},{"no":4,"file":"4과_정치-누가 원하는 대로 해야 하는가.md","title":"정치 — 누가 원하는 대로 해야 하는가","passage":"출애굽기 17:1-7 (르비딤에서의 모세의 리더십), 사도행전 4:19-20","verse":"사도행전 4:19 (개역개정)","core":"리더의 역할과 하나님 중심의 리더십","summary":""},{"no":5,"file":"5과_경제-맡겨 주셨어요.md","title":"경제 — 맡겨 주셨어요","passage":"마태복음 25:14-30 (달란트 비유, 개역개정)","verse":"마태복음 25:21 (개역개정)","core":"청지기 의식 / 하나님께서 주신 모든 것의 청지기로서의 삶","summary":""},{"no":6,"file":"6과_교육-왜 공부해야 하나요.md","title":"교육 — 왜 공부해야 하나요?","passage":"잠언 1:7, 잠언 2:1-6","verse":"잠언 1:7 (개역개정)","core":"지혜의 근본은 여호와를 경외함이며, 공부는 하나님의 세상을 이해하고 그의 일을 돕기 위한 준비","summary":""},{"no":7,"file":"7과_문화와 예술-아름다움의 주인.md","title":"문화와 예술 — 아름다움의 주인","passage":"출애굽기 31:1-6 (브살렐의 예술적 재능), 시편 19:1, 로마서 1:20","verse":"출애굽기 31:3 (개역개정)","core":"하나님은 아름다움의 창조자이며, 우리의 창의력과 예술적 감각도 하나님의 선물이고 그분의 형상을 반영","summary":""},{"no":8,"file":"8과_과학과 기술-하나님이 주신 지혜.md","title":"과학과 기술 — 하나님이 주신 지혜","passage":"창세기 1:28, 창세기 2:19-20","verse":"창세기 1:28 (개역개정)","core":"과학과 기술은 하나님의 창조 세계를 돌보고 인류를 섬기는 도구","summary":""},{"no":9,"file":"9과_환경-맡겨주신 세상을 돌보기.md","title":"환경 — 맡겨주신 세상을 돌보기","passage":"창세기 2:15, 시편 24:1","verse":"창세기 2:15 (개역개정)","core":"하나님은 우리에게 세상을 맡기셨습니다. 우리는 창조세계의 청지기입니다","summary":""},{"no":10,"file":"10과_미디어-진짜와 가짜를 구별하라.md","title":"미디어 — 진짜와 가짜를 구별하라","passage":"빌립보서 4:8, 요한일서 4:1","verse":"빌립보서 4:8 (개역개정)","core":"분별력, 진리 추구, 영적 분별","summary":""},{"no":11,"file":"11과_특강-하나님 나라의 시민으로 살기.md","title":"특강 — 하나님 나라의 시민으로 살기","passage":"빌립보서 3:20-21, 히브리서 11:13-16, 마태복음 5:3-12","verse":"빌립보서 3:20 (개역개정)","core":"시민권, 나그네 의식, 팔복, 삶의 변화","summary":""}]},{"q":2,"lessons":[{"no":1,"file":"1과_가정_하나님이세우신첫번째공동체.md","title":"가정 — 하나님이 세우신 첫 번째 공동체","passage":"창세기 2:18-24, 에베소서 5:21-6:4","verse":"\"네 아버지와 어머니를 공경하라 이것은 약속이 있는 첫 계명이니 이로써 네가 잘되고 땅에서 장수하리라\" (에베소서 6:2-3, 개역개정)","core":"가정은 하나님의 사랑을 배우는 첫 번째 공동체","summary":""},{"no":2,"file":"2과_부모자녀_은혜로맺어진관계.md","title":"부모·자녀 — 은혜로 맺어진 관계","passage":"에베소서 6:1-4, 잠언 22:6","verse":"\"마땅히 행할 길을 아이에게 가르치라 그리하면 늙어도 그것을 떠나지 아니하리라\" (잠언 22:6, 개역개정)","core":"부모님은 하나님이 보내주신 사랑의 통로; 부모를 공경하는 것은 하나님을 기쁘시게 함","summary":""},{"no":3,"file":"3과_형제자매_함께자라는기쁨.md","title":"형제자매 — 함께 자라는 기쁨","passage":"창세기 33:1-11 (야곱과 에서의 화해), 추가: 창세기 27-33장 (전체 맥락)","verse":"\"보라 형제가 연합하여 동거함이 어찌 그리 선하고 아름다운고\" (시편 133:1, 개역개정)","core":"형제자매는 경쟁이 아니라 함께 성장하는 동반자; 용서와 사랑이 관계를 회복함","summary":""},{"no":4,"file":"4과_친구_참된우정이란.md","title":"친구 — 참된 우정이란","passage":"사무엘상 18:1-4, 20:1-17 (다윗과 요나단)","verse":"\"친구는 사랑이 끊어지지 아니하고 형제는 위급한 때를 위하여 났느니라\" (잠언 17:17, 개역개정)","core":"참된 친구는 하나님 안에서 서로를 세워주는 사람; 다윗과 요나단의 우정이 그 모범","summary":""},{"no":5,"file":"5과_교회_하나님나라의전초기지.md","title":"교회 — 하나님 나라의 전초기지","passage":"사도행전 2:42-47","verse":"\"모이기를 폐하는 어떤 사람들의 습관과 같이 하지 말고 오직 권하여 그 날이 가까움을 볼수록 더욱 그리하자\" (히브리서 10:25, 개역개정)","core":"교회 공동체를 통한 하나님 나라 경험","summary":""},{"no":6,"file":"6과_선생님제자_가르침과배움의은혜.md","title":"선생님·제자 — 가르침과 배움의 은혜","passage":"디모데후서 1:1-7, 3:14-15","verse":"\"그러나 너는 배우고 확신한 일에 거하라 네가 누구에게서 배운 것을 알며\" (디모데후서 3:14, 개역개정)","core":"신앙의 세대 간 전승과 제자도","summary":""},{"no":7,"file":"7과_이웃_보이지않는울타리를넘어서.md","title":"이웃 — 보이지 않는 울타리를 넘어서","passage":"룻기 1:16-17, 2:1-12","verse":"\"원수를 갚지 말며 동포를 원망하지 말며 네 이웃 사랑하기를 네 자신과 같이 하라 나는 여호와이니라\" (레위기 19:18, 개역개정)","core":"민족과 문화의 경계를 넘는 사랑","summary":""},{"no":8,"file":"8과_갈등과용서_화해의사역자.md","title":"갈등과 용서 — 화해의 사역자","passage":"마태복음 18:21-35","verse":"\"서로 친절하게 하며 불쌍히 여기며 서로 용서하기를 하나님이 그리스도 안에서 너희를 용서하심과 같이 하라\" (에베소서 4:32, 개역개정)","core":"받은 용서를 기억하고 다른 사람을 용서하기","summary":""},{"no":9,"file":"9과_약한자와강한자_섬김의리더십.md","title":"약한 자와 강한 자 — 섬김의 리더십","passage":"마가복음 10:35-45","verse":"\"인자가 온 것은 섬김을 받으려 함이 아니라 도리어 섬기려 하고 자기 목숨을 많은 사람의 대속물로 주려 함이니라\" (마가복음 10:45, 개역개정)","core":"하나님 나라에서 진정한 리더십은 섬김입니다","summary":""},{"no":10,"file":"10과_다문화_하나님의다양한작품.md","title":"다문화 — 하나님의 다양한 작품","passage":"사도행전 10:1-35 (베드로와 고넬료)","verse":"\"베드로가 입을 열어 말하되 내가 참으로 하나님은 사람의 외모를 보지 아니하시고 각 나라 중 하나님을 경외하며 의를 행하는 사람은 다 받으시는 줄 깨달았도다\" (사도행전 10:34-35, 개역개정)","core":"하나님은 모든 민족과 문화를 귀하게 여기신다","summary":""},{"no":11,"file":"11과_종합특강_사랑의공동체를만드는사람.md","title":"종합(특강) — 사랑의 공동체를 만드는 사람","passage":"고린도전서 13:1-13","verse":"\"그런즉 믿음, 소망, 사랑, 이 세 가지는 항상 있을 것인데 그중의 제일은 사랑이라\" (고린도전서 13:13, 개역개정)","core":"모든 관계의 중심에 사랑이 있어야 한다","summary":""}]},{"q":3,"lessons":[{"no":1,"file":"1과_겸손.md","title":"겸손 — 낮은 곳에서 빛나는 사람","passage":"빌립보서 2:1-11 (신약)","verse":"\"아무 일에든지 다툼이나 허영으로 하지 말고 오직 겸손한 마음으로 각각 자기보다 남을 낫게 여기고\" (빌립보서 2:3, 개역개정)","core":"예수님의 겸손은 우리 신앙의 기초","summary":""},{"no":2,"file":"2과_감사.md","title":"감사 — 모든 상황에서 감사하기","passage":"데살로니가전서 5:16-18, 누가복음 17:11-19 (열 명의 나병환자) (신약)","verse":"\"범사에 감사하라 이것이 그리스도 예수 안에서 너희를 향하신 하나님의 뜻이니라\" (데살로니가전서 5:18, 개역개정)","core":"감사는 하나님의 은혜를 기억하는 것입니다","summary":""},{"no":3,"file":"3과_인내.md","title":"인내 — 기다림의 지혜","passage":"야고보서 5:7-11, 창세기 37-50장 (요셉의 이야기) (신약·구약)","verse":"\"인내를 온전히 이루라 이는 너희로 온전하고 구비하여 조금도 부족함이 없게 하려 함이라\" (야고보서 1:4, 개역개정)","core":"인내는 하나님의 때를 신뢰하는 것입니다","summary":""},{"no":4,"file":"4과_용기.md","title":"용기 — 두려움 앞에서 믿음으로","passage":"여호수아 1:6-9, 다니엘 3:13-30 (느부갓네살의 풀무불) (구약)","verse":"\"내가 네게 명령한 것이 아니냐 강하고 담대하라 두려워하지 말며 놀라지 말라 네가 어디로 가든지 네 하나님 여호와가 너와 함께 하느니라 하시니라\" (여호수아 1:9, 개역개정)","core":"하나님이 함께 하시면 두려워할 것이 없습니다","summary":""},{"no":5,"file":"5과_성실.md","title":"성실(誠實) — 보이지 않는 곳에서도","passage":"다니엘 6:1-10 (구약, 개역개정)","verse":"잠언 28:20 (개역개정) / Proverbs 28:20 (NIV 2011)","core":"","summary":""},{"no":6,"file":"6과_긍휼.md","title":"긍휼(矜恤) — 아픈 마음을 보는 눈","passage":"마태복음 9:35-38, 14:13-21 (오병이어) (신약, 개역개정)","verse":"마태복음 9:36 (개역개정) / Matthew 9:36 (NIV 2011)","core":"","summary":""},{"no":7,"file":"7과_절제.md","title":"절제(節制) — 자유를 위한 경계","passage":"고린도전서 9:24-27, 다니엘 1:8-16 (구약·신약, 개역개정)","verse":"고린도전서 9:25 (개역개정) / 1 Corinthians 9:25 (NIV 2011)","core":"","summary":""},{"no":8,"file":"8과_기쁨.md","title":"기쁨(喜悅) — 환경을 초월하는 기쁨","passage":"빌립보서 4:4-7, 사도행전 16:22-34 (신약, 개역개정)","verse":"빌립보서 4:4 (개역개정) / Philippians 4:4 (NIV 2011)","core":"","summary":""},{"no":9,"file":"9과_평화.md","title":"평화 — 다툼 속의 화평","passage":"마태복음 5:9 (신약)","verse":"마태복음 5:9","core":"화평하게 하는 자는 하나님의 아들이라 불립니다. 하나님 나라의 사람은 갈등 속에서 평화를 만듭니다.","summary":""},{"no":10,"file":"10과_소망.md","title":"소망 — 아직 보이지 않는 것을 믿기","passage":"히브리서 11:1-6 (신약)","verse":"히브리서 11:1","core":"소망은 아직 눈에 보이지 않아도 하나님의 약속을 \"꼭 이루어진다\"고 믿는 것입니다. 믿음의 선배들은 약속이 이루어지는 걸 다 보지 못했지만, 끝까지 믿고 기다렸습니다.","summary":""},{"no":11,"file":"11과_종합특강_성령의열매.md","title":"종합(특강) — 성령의 열매를 맺는 삶","passage":"갈라디아서 5:22-26 (신약)","verse":"갈라디아서 5:22-23","core":"하나님 나라의 성품은 우리의 노력이 아니라 성령님의 열매입니다. 성령님 안에서 살면 자연스럽게 열매가 맺힙니다.","summary":""}]},{"q":4,"lessons":[{"no":1,"file":"1과_부르심-나를부르신이유.md","title":"부르심 : 나를 부르신 이유","passage":"이사야 6:1-8","verse":"이사야 6:8","core":"하나님은 우리 각자를 특별한 목적으로 부르셨습니다.","summary":""},{"no":2,"file":"2과_은사-하나님이주신재능.md","title":"은사 : 하나님이 주신 재능","passage":"로마서 12:3-8","verse":"로마서 12:6","core":"모든 사람에게 다른 은사가 있습니다. 은사는 자신을 위한 것이 아니라 공동체를 세우기 위한 것입니다.","summary":""},{"no":3,"file":"3과_기도-하나님나라를위한대화.md","title":"기도 : 하나님 나라를 위한 대화","passage":"마태복음 6:9-13 (주기도문)","verse":"마태복음 6:10","core":"기도는 하나님 나라가 이 땅에 임하도록 구하는 것입니다.","summary":""},{"no":4,"file":"4과_전도-복음을나누는기쁨.md","title":"전도 : 복음을 나누는 기쁨","passage":"사도행전 8:26-40 (빌립과 에티오피아 내시)","verse":"로마서 1:16","core":"전도는 하나님 나라의 기쁜 소식을 나누는 것입니다.","summary":""},{"no":5,"file":"5과_선교-온세상을향한마음.md","title":"선교 : 온 세상을 향한 마음","passage":"마태복음 28:18-20, 사도행전 1:8","verse":"사도행전 1:8","core":"하나님 나라는 전 세계로 확장됩니다. 우리 모두가 선교사입니다.","summary":""},{"no":6,"file":"6과_헌신-나의전부를드리는삶.md","title":"헌신 — 나의 전부를 드리는 삶","passage":"","verse":"마가복음 12:44 / Mark 12:44 (NIV 2011)","core":"하나님 나라를 위한 헌신은 크기가 아니라 마음입니다.","summary":""},{"no":7,"file":"7과_고난-십자가를지고따르기.md","title":"고난 — 십자가를 지고 따르기","passage":"","verse":"마태복음 16:24 / Matthew 16:24 (NIV 2011)","core":"하나님 나라를 따르는 길에는 고난이 있지만, 그 끝에는 영광이 있습니다.","summary":""},{"no":8,"file":"8과_증거-삶으로보여주는복음.md","title":"증거 — 삶으로 보여주는 복음","passage":"","verse":"마태복음 5:16 / Matthew 5:16 (NIV 2011)","core":"우리의 삶 자체가 하나님 나라의 증거입니다.","summary":""},{"no":9,"file":"9과_소망-새하늘과새땅.md","title":"소망 — 새 하늘과 새 땅","passage":"","verse":"요한계시록 21:4 / Revelation 21:4 (NIV 2011)","core":"하나님 나라는 반드시 완성됩니다. 눈물도 아픔도 없는 그 날을 소망하며 오늘을 살아갑시다.","summary":""},{"no":10,"file":"10과_공동체-함께걸어가는믿음.md","title":"공동체 : 함께 걸어가는 믿음","passage":"히브리서 10:24-25, 사도행전 2:42-47","verse":"히브리서 10:24-25","core":"믿음의 여정은 혼자가 아니라 공동체와 함께 걸어가는 것입니다.","summary":""},{"no":11,"file":"11과_졸업-3년의여정-평생의믿음.md","title":"졸업 특강 — 3년의 여정, 평생의 믿음","passage":"","verse":"디모데후서 4:7 / 2 Timothy 4:7 (NIV 2011)","core":"3년간의 여정은 끝나지만, 믿음의 여정은 계속됩니다. 선한 싸움을 싸우고, 달려갈 길을 마치고, 믿음을 지킵시다.","summary":""}]}]}]},{"name":"중등부","years":[{"year":1,"quarters":[{"q":1,"lessons":[{"no":1,"file":"01_관점1_행동의_이면에_있는_관점.md","title":"행동의 이면에 있는 관점(틀) ①","passage":"(본 과는 성경 본문 없이 이론 학습)","verse":"","core":"말이나 행동의 이면에, 그렇게 말하고 행동하는 관점(틀)이 있습니다","summary":"누군가가 어떤 행동을 할 때는 그런 행동을 하는 이유가 있습니다. 이것을 '관점(틀)', 혹은 '세계관'이라고 합니다."},{"no":2,"file":"02_관점2_행동의_이면에_있는_관점.md","title":"행동의 이면에 있는 관점(틀) ②","passage":"요한복음 12:1-8, 빌립보서 4:6-7 (개역개정)","verse":"빌립보서 4:6-7","core":"드러나는 행동보다 그 행동을 만드는 관점(틀)이 훨씬 더 중요합니다","summary":"어떤 사람의 행동은 드러난 행동만으로 모두 설명되지 않습니다. 그런 행동을 하게 된 이유가 있기 때문입니다."},{"no":3,"file":"03_사실1_관점에_따라_달라지는_사실.md","title":"관점에 따라 달라지는 사실 ①","passage":"(본 과는 성경 본문 없이 이론 학습)","verse":"","core":"관점(틀)에 따라서 사실이 달라질 수 있습니다","summary":"관점(틀)이 어떤 사건을 있는 그대로 보게 하지 않고, 다시 해석하게 합니다."},{"no":4,"file":"04_사실2_관점에_따라_달라지는_사실.md","title":"관점에 따라 달라지는 사실 ②","passage":"사무엘하 6:12-23 (개역개정)","verse":"사무엘하 6:21","core":"다윗과 미갈은 같은 사건을 전혀 다른 관점(틀)으로 판단했습니다","summary":"관점(틀)이 어떤 사실을 있는 그대로 보게 하지 않고, 관점으로 다시 해석합니다. 4과에서는 이와 관련된 실제적인 것을 공부합니다."},{"no":5,"file":"05_전제1_모든_주장의_배경에_있는_전제.md","title":"모든 주장의 배경에 있는 전제(믿음, 신념) ①","passage":"(본 과는 성경 본문 없이 이론 학습)","verse":"","core":"믿음(신념)은 거의 모든 이해의 토대(기초)입니다","summary":"사람들은 이해를 시켜주면 믿겠다고 하지만, 사실 대부분의 사람들은 믿기 때문에 이해합니다."},{"no":6,"file":"06_전제2_모든_주장의_배경에_있는_전제.md","title":"모든 주장의 배경에 있는 전제(믿음, 신념) ②","passage":"요한복음 20:29, 창세기 3:4-6, 히브리서 4:12 외 (개역개정)","verse":"히브리서 4:12","core":"말씀으로 새로워진 생각만이 유익한 결과를 만듭니다","summary":"진리는 이해나 확인, 검증을 통해서 진리가 되는 것이 아니라, 그런 것이 없어도 그 자체가 '진리'입니다."},{"no":7,"file":"07_차이1_다르다_vs_틀리다.md","title":"일반적 세계관과 성경적 세계관의 차이: 다르다 vs 틀리다 ①","passage":"(본 과는 성경 본문 없이 이론 학습)","verse":"","core":"기독 청소년에게 성경의 가르침과 다르면, 틀린 것입니다. 성경 외의 차이는 다름입니다","summary":"사람들의 생각은 성경 말씀을 따를 때만 올바르게 됩니다. 이것을 '다르다와 틀리다'로 살펴봅니다."},{"no":8,"file":"08_차이2_다르다_vs_틀리다.md","title":"일반적 세계관과 성경적 세계관의 차이: 다르다 vs 틀리다 ②","passage":"열왕기하 5:11, 사도행전 16:6-10 (개역개정)","verse":"히브리서 4:12 (6과 인용 전문 재사용)","core":"성경적 세계관은 다름이 아니라, 옳고 그름으로 접근합니다","summary":"하나님의 말씀을 다름으로 판단한 나아만은 어려움에 처했고, 옳고 그름으로 받아들인 사도 바울은 위대한 하나님의 사람이 되었습니다."},{"no":9,"file":"09_핵심_창조_타락_구속.md","title":"성경적 세계관의 핵심: 창조-타락-구속","passage":"디모데전서 4:4-5, 창세기 3:17 (장절 표기)","verse":"","core":"창조, 타락, 구속의 성경적 세계관의 핵심은 '생명'입니다","summary":"하나님이 세상을 선하게 창조하셨고, 사람의 죄로 창조 세계 전체가 타락했으며, 예수님의 구속을 통해서 창조 세계가 회복되었습니다."},{"no":10,"file":"10_실제_삶이_있는_신앙.md","title":"성경적 세계관의 실제: '삶이 있는 신앙'","passage":"야고보서 1:26-27 (개역개정)","verse":"야고보서 1:26-27","core":"삶이 있는 신앙이란 신앙이 생활 속에 스며 있는 것을 의미합니다","summary":"창조, 타락, 구속의 성경적 세계관의 실제적인 모습이 '삶이 있는 신앙'입니다."},{"no":11,"file":"11_특강_세계관에_기초한_설교.md","title":"특강: 세계관에 기초한 설교","passage":"열왕기하 6:14-17 (개역개정) <!-- 감수: 설교가 \"14절\"로 인용하는 본문(\"하나님의 사람의 사환이 일찍이 일어나서…\")은 개역개정 기준 왕하 6:15에 해당하는 것으로 보임. 원전 표기 그대로 보존 — 확인 필요 -->","verse":"","core":"환경이 아니라 그 환경을 바라보는 시각이 삶을 결정합니다","summary":"누군가가 어떤 행동을 할 때는 그런 행동을 하는 이유가 있습니다. 특강에서는 성경 말씀을 통하여 세계관에 기초한 메시지를 듣게 됩니다."}]},{"q":2,"lessons":[{"no":1,"file":"01_창조.md","title":"창조: 말씀으로 세상을 만드신 창조주 하나님","passage":"창세기 1:1-31, 시편 8:1-9 (개역개정)","verse":"","core":"하나님께서 세상을 \"말씀으로\" 창조하셨습니다. 그리고 특별히 하나님의 형상으로 사람을 만드셨습니다.","summary":"하나님께서 세상을 \"말씀으로\" 창조하셨습니다. 그리고 특별히 하나님의 형상으로 사람을 만드셨습니다."},{"no":2,"file":"02_타락.md","title":"타락: 말씀에 불순종한 인간","passage":"창세기 3:1-24, 로마서 5:12 (개역개정)","verse":"","core":"하나님의 말씀에 불순종하므로 인간은 타락하였습니다. \"하나님의 말씀에 불순종\"하는 것이 곧 성경이 말하는 죄(罪)입니다.","summary":"하나님의 말씀에 불순종하므로 인간은 타락하였습니다. \"하나님의 말씀에 불순종\"하는 것이 곧 성경이 말하는 죄(罪)입니다."},{"no":3,"file":"03_구속.md","title":"구속: 생명의 말씀 = 예수 그리스도","passage":"요한복음 6:47-51, 로마서 5:12-19 (개역개정)","verse":"","core":"하나님께서는 죄 가운데 타락한 인간을 구원하기 위해 독생자 예수 그리스도를 이 땅에 보내셨습니다. \"예수님은 생명의 떡\"으로 우리에게 오셨습니다.","summary":"하나님께서는 죄 가운데 타락한 인간을 구원하기 위해 독생자 예수 그리스도를 이 땅에 보내셨습니다. \"예수님은 생명의 떡\"으로 우리에게 오셨습니다."},{"no":4,"file":"04_진리.md","title":"진리: 말씀과 동행하는 삶(信行一致)","passage":"요한복음 1:1, 14, 누가복음 24:27, 32 (개역개정)","verse":"","core":"말씀은 곧 예수님입니다. 우리는 말씀을 통해 예수님을 만날 수 있고, 예수님과 동행하는 삶을 살 수 있습니다.","summary":"말씀은 곧 예수님입니다. 우리는 말씀을 통해 예수님을 만날 수 있고, 예수님과 동행하는 삶을 살 수 있습니다."},{"no":5,"file":"05_말씀.md","title":"말씀: 오직 한 길","passage":"요한복음 14:1-7, 빌립보서 3:5-9 (개역개정)","verse":"","core":"세상에 수많은 가치들과 자랑거리들이 있지만, 우리에게 가장 소중한 것은 하나님께 이르는 유일한 길, 예수 그리스도(말씀)뿐입니다.","summary":"세상에 수많은 가치들과 자랑거리들이 있지만, 우리에게 가장 소중한 것은 하나님께 이르는 유일한 길, 예수 그리스도(말씀)뿐입니다."},{"no":6,"file":"06_말씀으로_준비하기.md","title":"말씀으로 준비하기: 말씀으로 모세를 부르신 하나님","passage":"출애굽기 3:1-15, 사도행전 7:30-34 (개역개정)","verse":"","core":"하나님께서 직접 모세를 찾아와 그를 부르셨습니다. 인격적인 하나님은 말씀을 통해 우리를 만나주십니다.","summary":"하나님께서 직접 모세를 찾아와 그를 부르셨습니다. 인격적인 하나님은 말씀을 통해 우리를 만나주십니다."},{"no":7,"file":"07_말씀으로_세워지기.md","title":"말씀으로 세워지기: 말씀으로 모세를 세우신 하나님","passage":"출애굽기 4:1-17 (개역개정)","verse":"","core":"하나님께서는 우리가 하나님의 말씀에 집중하기 원하십니다. 우리는 하나님의 말씀을 통해 온전한 하나님의 사람으로 세워질 수 있습니다.","summary":"하나님께서는 우리가 하나님의 말씀에 집중하기 원하십니다. 우리는 하나님의 말씀을 통해 온전한 하나님의 사람으로 세워질 수 있습니다."},{"no":8,"file":"08_말씀으로_승리하기.md","title":"말씀으로 승리하기: 하나님의 약속을 붙잡은 모세","passage":"출애굽기 5:22-6:12, 7:1-7 (개역개정)","verse":"","core":"우리는 말씀을 따라 살면서도 때로는 낙심하고 좌절하게 될 수도 있습니다. 그럴 때에 우리는 다시 하나님의 말씀을 의지하여 일어서야 합니다.","summary":"우리는 말씀을 따라 살면서도 때로는 낙심하고 좌절하게 될 수도 있습니다. 그럴 때에 우리는 다시 하나님의 말씀을 의지하여 일어서야 합니다."},{"no":9,"file":"09_말씀으로_위로받기.md","title":"말씀으로 위로받기: 말씀으로 이스라엘을 돌보시는 하나님","passage":"출애굽기 15:22-26 (개역개정)","verse":"","core":"우리는 때로 예기치 않은 어려움과 고통을 겪게 됩니다. 그 때 우리가 할 수 있는 최선의 행동은 하나님의 말씀을 의지하는 것입니다.","summary":"우리는 때로 예기치 않은 어려움과 고통을 겪게 됩니다. 그 때 우리가 할 수 있는 최선의 행동은 하나님의 말씀을 의지하는 것입니다."},{"no":10,"file":"10_예배.md","title":"예배: 삶으로 드리는 예배 = 복음으로 사는 삶","passage":"요한복음 4:23-24, 빌립보서 1:27-30 (개역개정)","verse":"","core":"우리는 온 마음을 다해 성령과 진리(말씀)로 하나님께 예배드려야 합니다. 그리고 일상의 삶 속에서도 날마다 하나님을 예배해야 합니다.","summary":"우리는 온 마음을 다해 성령과 진리(말씀)로 하나님께 예배드려야 합니다. 그리고 일상의 삶 속에서도 날마다 하나님을 예배해야 합니다."},{"no":11,"file":"11_특강_예수님의_청소년_시절.md","title":"특강: 예수님의 청소년 시절(청소년 특강)","passage":"누가복음 2:40-52 (개역개정)","verse":"","core":"인간의 몸으로 이 땅에 오신 예수님도 우리와 마찬가지로 청소년기를 보내시며 성장하셨습니다. 청소년인 우리들도 예수님처럼 성장하고 성숙해야 합니다.","summary":"인간의 몸으로 이 땅에 오신 예수님도 우리와 마찬가지로 청소년기를 보내시며 성장하셨습니다. 청소년인 우리들도 예수님처럼 성장하고 성숙해야 합니다."}]},{"q":3,"lessons":[{"no":1,"file":"01_신론1_하늘과_달과_별들.md","title":"신론1: 하늘과 달과 별들","passage":"시편 8:1-9 (개역개정)","verse":"","core":"하나님께서 하늘과 달과 별들, 그리고 이 땅에 살아가는 모든 생명체들을 창조하셨습니다.","summary":"하나님께서 하늘과 달과 별들, 그리고 이 땅에 살아가는 모든 생명체들을 창조하셨습니다."},{"no":2,"file":"02_신론2_하나님은_사랑이시라.md","title":"신론2: 하나님은 사랑이시라(God is love)","passage":"출애굽기 34:4-6, 요한일서 4:7-12 (개역개정)","verse":"","core":"우리를 사랑하시는 주님은 자비롭고 은혜롭고 노하기를 더디 하시고 인자와 진실이 많으신 하나님입니다.","summary":"우리를 사랑하시는 주님은 자비롭고 은혜롭고 노하기를 더디 하시고 인자와 진실이 많으신 하나님입니다."},{"no":3,"file":"03_인간론1_하나님의_닮은꼴.md","title":"인간론1: 하나님의 닮은꼴","passage":"창세기 1:26-28, 시편 8:1-9 (개역개정)","verse":"","core":"하나님께서는 모든 생명체들 중 유일하게 사람만을 '하나님의 형상'대로 창조하셨습니다.","summary":"하나님께서는 모든 생명체들 중 유일하게 사람만을 '하나님의 형상'대로 창조하셨습니다."},{"no":4,"file":"04_인간론2_나의_몸은_누구_것인가.md","title":"인간론2: 나의 몸은 누구 것인가?","passage":"골로새서 3:1-10, 고린도전서 6:18-20 (개역개정)","verse":"","core":"우리는 주 안에서 '옛 사람'을 벗고 '새 사람'을 입어야 합니다. 우리 몸은 우리 자신의 것이 아니라 하나님께 속한 것입니다.","summary":"우리는 주 안에서 '옛 사람'을 벗고 '새 사람'을 입어야 합니다. 우리 몸은 우리 자신의 것이 아니라 하나님께 속한 것입니다."},{"no":5,"file":"05_기독론1_한_마리의_어린_양.md","title":"기독론1: 한 마리의 어린 양","passage":"요한복음 1:26-34 (개역개정)","verse":"","core":"예수님께서는 '세상 죄를 지고 가는 하나님의 어린 양'으로 우리를 구원하시기 위해 이 땅에 오셨습니다.","summary":"예수님께서는 '세상 죄를 지고 가는 하나님의 어린 양'으로 우리를 구원하시기 위해 이 땅에 오셨습니다."},{"no":6,"file":"06_기독론2_선하신_목자.md","title":"기독론2: 선하신 목자","passage":"요한복음 10:1-5, 11-16, 시편 23편 (개역개정)","verse":"","core":"예수님은 우리의 선한 목자입니다. 선한 목자는 자기 양의 이름을 각각 불러 선한 길로 인도하십니다.","summary":"예수님은 우리의 선한 목자입니다. 선한 목자는 자기 양의 이름을 각각 불러 선한 길로 인도하십니다."},{"no":7,"file":"07_구원론_Holy_Spirit.md","title":"구원론: Holy Spirit(성령)","passage":"요한복음 14:16-17, 26, 갈라디아서 5:22-26 (개역개정)","verse":"","core":"예수님께서 그리스도의 영이신 보혜사 성령을 우리에게 보내주셨습니다. 성령은 우리 속에 계시고, 우리와 함께 거하시며 역사하십니다.","summary":"예수님께서 그리스도의 영이신 보혜사 성령을 우리에게 보내주셨습니다. 성령은 우리 속에 계시고, 우리와 함께 거하시며 역사하십니다."},{"no":8,"file":"08_교회론_말씀의_반석_위에_세운_교회.md","title":"교회론: 말씀의 반석 위에 세운 교회","passage":"마태복음 16:13-20 (개역개정)","verse":"","core":"예수님께서는 베드로가 아니라 '주를 그리스도요 하나님의 아들'로 고백하는 바른 신앙고백 위에 교회를 세우겠다고 말씀하셨습니다.","summary":"예수님께서는 베드로가 아니라 '주를 그리스도요 하나님의 아들'로 고백하는 바른 신앙고백 위에 교회를 세우겠다고 말씀하셨습니다."},{"no":9,"file":"09_종말론_세상의_끝에서.md","title":"종말론: 세상의 끝에서","passage":"데살로니가전서 4:13-5:6 (개역개정)","verse":"","core":"예수님께서는 세상을 심판하기 위해 이 땅에 다시 강림(降臨)하실 것입니다. 그러나 우리는 그 때와 시기는 알 수 없습니다.","summary":"예수님께서는 세상을 심판하기 위해 이 땅에 다시 강림(降臨)하실 것입니다. 그러나 우리는 그 때와 시기는 알 수 없습니다."},{"no":10,"file":"10_헌금_먼저_자신을_주께_드리고.md","title":"헌금: 먼저 자신을 주께 드리고","passage":"고린도전서 16:1-4, 고린도후서 8:1-5 (개역개정)","verse":"","core":"헌금은 성도가 서로를 돕고 교회를 섬기기 위해 자원하는 마음으로 하나님께 드리는 것입니다.","summary":"헌금은 성도가 서로를 돕고 교회를 섬기기 위해 자원하는 마음으로 하나님께 드리는 것입니다."},{"no":11,"file":"11_특강_나귀를_타신_겸손의_왕.md","title":"특강: 나귀를 타신 겸손의 왕","passage":"마태복음 21:1-11 (개역개정)","verse":"","core":"겸손의 왕이신 예수님께서 십자가를 지기 위해 나귀를 타고 예루살렘에 들어가셨습니다.","summary":"겸손의 왕이신 예수님께서 십자가를 지기 위해 나귀를 타고 예루살렘에 들어가셨습니다."}]},{"q":4,"lessons":[{"no":1,"file":"01_메시야_예언.md","title":"메시야 예언: 그 분이 오실 거라고?","passage":"마태복음 1:18-25, 이사야 7:14 (개역개정)","verse":"","core":"하나님께서는 우리를 구원하실 메시야를 보내주시겠다고 약속(예언)하셨고, 그 약속은 예수님의 출생을 통해 성취되었습니다.","summary":"하나님께서는 우리를 구원하실 메시야를 보내주시겠다고 약속(예언)하셨고, 그 약속은 예수님의 출생을 통해 성취되었습니다."},{"no":2,"file":"02_탄생.md","title":"탄생: 첫 번째 크리스마스","passage":"누가복음 2:1-21 (개역개정)","verse":"","core":"하나님의 아들이신 예수님께서 우리를 구원하시기 위해 우리와 같은 연약한 아기의 몸으로 이 땅에 태어나셨습니다(성탄).","summary":"하나님의 아들이신 예수님께서 우리를 구원하시기 위해 우리와 같은 연약한 아기의 몸으로 이 땅에 태어나셨습니다(성탄)."},{"no":3,"file":"03_어린_시절.md","title":"어린 시절: 아기 예수를 영접한 시므온","passage":"누가복음 2:22-35 (개역개정)","verse":"","core":"말씀을 믿고 순종하며 살아가는 자에게 예수님께서 친히 찾아오십니다. 의롭고 경건한 시므온은 약속의 말씀을 믿고 메시야를 기다렸고, 그리스도이신 예수님께서 그를 찾아오셨습니다.","summary":"말씀을 믿고 순종하며 살아가는 자에게 예수님께서 친히 찾아오십니다. 의롭고 경건한 시므온은 약속의 말씀을 믿고 메시야를 기다렸고, 그리스도이신 예수님께서 그를 찾아오셨습니다."},{"no":4,"file":"04_공생애_시작.md","title":"공생애 시작: 너는 내 사랑하는 아들이라","passage":"누가복음 3:21-38 (개역개정)","verse":"","core":"하나님께서는 친히 예수님에 대해 \"너는 내 사랑하는 아들이며, 내가 너를 기뻐한다\"고 말씀하셨습니다. 예수님은 하나님의 아들입니다.","summary":"하나님께서는 친히 예수님에 대해 \"너는 내 사랑하는 아들이며, 내가 너를 기뻐한다\"고 말씀하셨습니다. 예수님은 하나님의 아들입니다."},{"no":5,"file":"05_가르침.md","title":"가르침: 안식일의 참된 주인","passage":"누가복음 6:1-11 (개역개정)","verse":"","core":"안식일의 주인은 예수님입니다. 예수님께서는 안식일에 선을 행하고, 생명을 구하며 자기 백성을 돌보셨습니다.","summary":"안식일의 주인은 예수님입니다. 예수님께서는 안식일에 선을 행하고, 생명을 구하며 자기 백성을 돌보셨습니다."},{"no":6,"file":"06_병고침.md","title":"병고침: 예수님의 힐링 캠프","passage":"누가복음 18:35-43 (개역개정)","verse":"","core":"예수님께서는 '다윗의 자손', 즉 구원자 메시야로 우리를 찾아오셨습니다. 주님께서는 우리의 아픔과 연약함을 치료하시고 회복시켜주십니다.","summary":"예수님께서는 '다윗의 자손', 즉 구원자 메시야로 우리를 찾아오셨습니다. 주님께서는 우리의 아픔과 연약함을 치료하시고 회복시켜주십니다."},{"no":7,"file":"07_죽으심.md","title":"죽으심: 성소 휘장이 찢어진 이유","passage":"누가복음 23:44-49 (개역개정)","verse":"","core":"예수님께서 십자가에서 숨지시던 순간에 성소의 휘장이 찢어졌습니다. 예수님은 우리를 구원하기 위해 오신 메시야로서 십자가에서 죽으신 것입니다.","summary":"예수님께서 십자가에서 숨지시던 순간에 성소의 휘장이 찢어졌습니다. 예수님은 우리를 구원하기 위해 오신 메시야로서 십자가에서 죽으신 것입니다."},{"no":8,"file":"08_부활.md","title":"부활: 참 부활과 참 생명","passage":"누가복음 24:36-49 (개역개정)","verse":"","core":"예수님께서는 십자가 위에서 완전히 죽으셨습니다. 그리고 성경 말씀대로 죽은 지 3일 만에 부활하셨고, 많은 사람들에게 나타나셨습니다.","summary":"예수님께서는 십자가 위에서 완전히 죽으셨습니다. 그리고 성경 말씀대로 죽은 지 3일 만에 부활하셨고, 많은 사람들에게 나타나셨습니다."},{"no":9,"file":"09_재림.md","title":"재림: 내가 진실로 속히 오리라","passage":"누가복음 21:25-27, 마태복음 25:31-33, 요한계시록 22:20-21 (개역개정)","verse":"","core":"예수님께서는 이 땅에 다시 오실 것입니다. 재림하신 주님은 심판주로서 우리를 심판하실 것입니다.","summary":"예수님께서는 이 땅에 다시 오실 것입니다. 재림하신 주님은 심판주로서 우리를 심판하실 것입니다."},{"no":10,"file":"10_성품.md","title":"성품: 예수님의 겸손을 배우라","passage":"요한복음 13:1-17 (개역개정)","verse":"","core":"우리의 구주이신 예수님께서 겸손한 종의 모습으로 제자들의 더러운 발을 씻어 주셨습니다. 우리는 그리스도의 제자로서 주님의 겸손과 사랑을 실천하며 살아야 합니다.","summary":"우리의 구주이신 예수님께서 겸손한 종의 모습으로 제자들의 더러운 발을 씻어 주셨습니다. 우리는 그리스도의 제자로서 주님의 겸손과 사랑을 실천하며 살아야 합니다."},{"no":11,"file":"11_특강_성경의_땅_이스라엘_여행.md","title":"특강: 성경의 땅, 이스라엘 여행","passage":"요한복음 2:19-21, 21:1-11 (개역개정)","verse":"","core":"우리는 성경에 나오는 이스라엘 지역과 문화에 대해 배움으로써 성경을 보다 깊이 이해할 수 있습니다. 예수님께서는 2천 년 전 이스라엘 땅에서 사역하셨지만, 우리는 그곳에 가지 않더라도 성경을 통해 예수님을 생생하게 만날 수 있습니다.","summary":"우리는 성경에 나오는 이스라엘 지역과 문화에 대해 배움으로써 성경을 보다 깊이 이해할 수 있습니다. 예수님께서는 2천 년 전 이스라엘 땅에서 사역하셨지만, 우리는 그곳에 가지 않더라도 성경을 통해 예수님을 생생하게 만날 수 있습니다."}]}]},{"year":2,"quarters":[{"q":1,"lessons":[{"no":1,"file":"01_구속사로_보는_창조.md","title":"구속사의 관점으로 보는 창조: 창세 전에 나를 택하신 하나님","passage":"창세기 1:26-31, 에베소서 1:3-12 (개역개정)","verse":"","core":"하나님께서 창세 전에 그리스도 안에서 우리를 택하셨습니다. 우리는 하나님의 기쁘신 뜻대로 구원을 예정 받은 하나님의 백성입니다.","summary":"하나님께서 창세 전에 그리스도 안에서 우리를 택하셨습니다. 우리는 하나님의 기쁘신 뜻대로 구원을 예정 받은 하나님의 백성입니다."},{"no":2,"file":"02_구속사로_보는_타락.md","title":"구속사의 관점으로 보는 타락: 한 사람으로 말미암아…","passage":"창세기 2:15-17, 로마서 5:12-14 (개역개정)","verse":"","core":"인류의 첫 조상 아담은 하나님께서 금지하신 열매를 먹음으로 타락하였습니다. 한 사람으로 말미암아 죄와 사망이 모든 사람에게 들어왔습니다.","summary":"인류의 첫 조상 아담은 하나님께서 금지하신 열매를 먹음으로 타락하였습니다. 한 사람으로 말미암아 죄와 사망이 모든 사람에게 들어왔습니다."},{"no":3,"file":"03_구속사로_보는_구속.md","title":"구속사의 관점으로 보는 구속: 인류를 구원할 슈퍼 히어로","passage":"로마서 3:20-28 (개역개정)","verse":"","core":"우리는 모두 거룩하신 하나님 앞에서 죽을 수밖에 없는 죄인입니다. 그런데 하나님께서 그리스도의 피로 우리의 죄를 속량하시고 구원의 길을 열어주셨습니다.","summary":"우리는 모두 거룩하신 하나님 앞에서 죽을 수밖에 없는 죄인입니다. 그런데 하나님께서 그리스도의 피로 우리의 죄를 속량하시고 구원의 길을 열어주셨습니다."},{"no":4,"file":"04_구속의_필요성.md","title":"구속의 필요성: 예수님이 왜 필요해?","passage":"요한복음 3:1-17 (개역개정)","verse":"","core":"예수님께서 니고데모에게 중생(거듭남)에 대해 말씀하셨습니다. 죄인인 우리는 성령으로 거듭나야 하나님 나라에 들어갈 수 있습니다.","summary":"예수님께서 니고데모에게 중생(거듭남)에 대해 말씀하셨습니다. 죄인인 우리는 성령으로 거듭나야 하나님 나라에 들어갈 수 있습니다."},{"no":5,"file":"05_속죄1_첫_번째_유월절_밤에.md","title":"속죄1: 첫 번째 유월절 밤에","passage":"출애굽기 12:1-14 (개역개정)","verse":"","core":"이스라엘 백성들은 흠 없는 어린 양을 잡아 그 피를 집 문에 발랐습니다. 하나님께서는 그 피를 보시고 그 집을 넘으사 자기 백성들을 구원하셨습니다.","summary":"이스라엘 백성들은 흠 없는 어린 양을 잡아 그 피를 집 문에 발랐습니다. 하나님께서는 그 피를 보시고 그 집을 넘으사 자기 백성들을 구원하셨습니다."},{"no":6,"file":"06_속죄2_어린_양의_피.md","title":"속죄2: 어린 양의 피","passage":"레위기 4:27-35 (개역개정)","verse":"","core":"구약의 백성들은 하나님께 속죄의 제사를 드림으로 죄 사함을 받았으나, 우리는 십자가에서 죽으신 그리스도의 보혈로 죄 사함을 받았습니다.","summary":"구약의 백성들은 하나님께 속죄의 제사를 드림으로 죄 사함을 받았으나, 우리는 십자가에서 죽으신 그리스도의 보혈로 죄 사함을 받았습니다."},{"no":7,"file":"07_속죄3_그리스도의_보혈.md","title":"속죄3: 그리스도의 보혈","passage":"히브리서 9:11-15 (개역개정)","verse":"","core":"그리스도께서 흠 없는 자기의 피로 영원한 속죄를 이루사, 부르심을 입은 자기 백성을 속량하시고 영원한 생명을 얻게 하셨습니다.","summary":"그리스도께서 흠 없는 자기의 피로 영원한 속죄를 이루사, 부르심을 입은 자기 백성을 속량하시고 영원한 생명을 얻게 하셨습니다."},{"no":8,"file":"08_구속1_하나님의_선물.md","title":"구속1: 하나님의 선물","passage":"에베소서 2:1-10 (개역개정)","verse":"","core":"우리는 하나님께서 우리를 사랑하시는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았습니다. 우리가 받은 구원은 하나님의 선물입니다.","summary":"우리는 하나님께서 우리를 사랑하시는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았습니다. 우리가 받은 구원은 하나님의 선물입니다."},{"no":9,"file":"09_구속2_나를_불쌍히_여기소서.md","title":"구속2: 나를 불쌍히 여기소서","passage":"마가복음 10:46-52 (개역개정)","verse":"","core":"바디매오는 나사렛 예수님이 지나간다는 소식을 듣고 간절히 주님을 만나기 원했습니다. 예수님께서는 그에게 '네 믿음이 너를 구원하였다'고 말씀하셨습니다.","summary":"바디매오는 나사렛 예수님이 지나간다는 소식을 듣고 간절히 주님을 만나기 원했습니다. 예수님께서는 그에게 '네 믿음이 너를 구원하였다'고 말씀하셨습니다."},{"no":10,"file":"10_구속3_끊어지지_않는_사랑.md","title":"구속3: 끊어지지 않는 사랑","passage":"로마서 8:31-39 (개역개정)","verse":"","core":"하나님께서는 우리를 사랑하사 자기 아들(예수 그리스도)을 우리에게 주셨습니다. 그 어떤 것도 우리를 그리스도의 사랑에서 끊을 수 없습니다.","summary":"하나님께서는 우리를 사랑하사 자기 아들(예수 그리스도)을 우리에게 주셨습니다. 그 어떤 것도 우리를 그리스도의 사랑에서 끊을 수 없습니다."},{"no":11,"file":"11_특강_토마스_선교사님.md","title":"한국교회사 특강: 토마스 선교사님","passage":"요한복음 12:24-25 (개역개정)","verse":"","core":"\"한 알의 밀이 땅에 떨어져 죽으면 많은 열매를 맺느니라.\" 한국 최초의 개신교 순교자 토마스 선교사의 죽음은, 한 알의 밀알이 되어 한국교회의 태동과 부흥의 밑거름이 되었습니다.","summary":"\"한 알의 밀이 땅에 떨어져 죽으면 많은 열매를 맺느니라.\" 한국 최초의 개신교 순교자 토마스 선교사의 죽음은, 한 알의 밀알이 되어 한국교회의 태동과 부흥의 밑거름이 되었습니다."}]},{"q":2,"lessons":[{"no":1,"file":"01_신론1_거짓_신들의_세계.md","title":"신론1: 거짓 신들의 세계","passage":"출애굽기 20:1-6 (개역개정)","verse":"","core":"하나님께서는 십계명을 주시며, 자기 백성들에게 하나님 외에는 다른 신들을 두지 말고, 우상을 만들지 말라고 명령하셨습니다. 하나님 이외에 다른 신은 없습니다.","summary":"하나님께서는 십계명을 주시며, 자기 백성들에게 하나님 외에는 다른 신들을 두지 말고, 우상을 만들지 말라고 명령하셨습니다. 하나님 이외에 다른 신은 없습니다."},{"no":2,"file":"02_신론2_하나님을_부정하는_세상.md","title":"신론2: 하나님을 부정하는 세상","passage":"디모데후서 3:1-9 (개역개정)","verse":"","core":"말세에는 사람들이 자기를 사랑하며 죄악 된 본성에 빠져 살게 됩니다. 이처럼 마음이 부패한 자들은 끝내 진리(하나님)의 지식에 이를 수 없습니다.","summary":"말세에는 사람들이 자기를 사랑하며 죄악 된 본성에 빠져 살게 됩니다. 이처럼 마음이 부패한 자들은 끝내 진리(하나님)의 지식에 이를 수 없습니다."},{"no":3,"file":"03_인간론1_에덴동산에서_추방당한_인간.md","title":"인간론1: 에덴동산에서 추방당한 인간","passage":"창세기 3:9-24 (개역개정)","verse":"","core":"세상의 첫 인류인 아담과 하와가 하나님 말씀에 불순종하므로 죄를 범했습니다. 하나님께서는 타락한 인간을 심판하시고, 에덴동산에서 추방하셨습니다.","summary":"세상의 첫 인류인 아담과 하와가 하나님 말씀에 불순종하므로 죄를 범했습니다. 하나님께서는 타락한 인간을 심판하시고, 에덴동산에서 추방하셨습니다."},{"no":4,"file":"04_인간론2_뜨거운_감자_동성애.md","title":"인간론2: 뜨거운 감자, 동성애(同性愛)","passage":"로마서 1:26-32, 고린도전서 6:9-11 (개역개정)","verse":"","core":"성(性)을 하나님의 창조 질서를 거슬러 사용하는 죄들이 세상에 있습니다. 그리스도인은 이러한 사회적 이슈에 대해 성경적인 관점을 분명히 알고 있어야 하며, 동시에 사람을 미워하지 않고 진리 안에서 사랑할 수 있어야 합니다.","summary":"성(性)을 하나님의 창조 질서를 거슬러 사용하는 죄들이 세상에 있습니다. 그리스도인은 이러한 사회적 이슈에 대해 성경적인 관점을 분명히 알고 있어야 하며, 동시에 사람을 미워하지 않고 진리 안에서 사랑할 수 있어야 합니다."},{"no":5,"file":"05_기독론1_진짜_신의_아들이라고.md","title":"기독론1: 진짜 신의 아들이라고?","passage":"마가복음 4:35-41 (개역개정)","verse":"","core":"예수님께서 거친 풍랑(風浪)을 꾸짖으시자 바람이 그치고 바다가 잔잔해졌습니다. 예수님은 창조주 하나님의 아들로서 대자연을 통치하시는 분입니다.","summary":"예수님께서 거친 풍랑(風浪)을 꾸짖으시자 바람이 그치고 바다가 잔잔해졌습니다. 예수님은 창조주 하나님의 아들로서 대자연을 통치하시는 분입니다."},{"no":6,"file":"06_기독론2_세상이_알_수_없는_사랑.md","title":"기독론2: 세상이 알 수 없는 사랑","passage":"빌립보서 2:5-8 (개역개정)","verse":"","core":"예수님은 근본 하나님의 본체시나 종의 형체를 가지고 사람의 모양으로 나타나셔서(성육신), 자기 백성들을 살리기 위하여 십자가에서 죽으셨습니다.","summary":"예수님은 근본 하나님의 본체시나 종의 형체를 가지고 사람의 모양으로 나타나셔서(성육신), 자기 백성들을 살리기 위하여 십자가에서 죽으셨습니다."},{"no":7,"file":"07_구원론_성령님의_얼굴.md","title":"구원론: 성령님의 얼굴","passage":"요한복음 16:5-15 (개역개정)","verse":"","core":"예수님께서 제자들을 떠나시며(승천) 보혜사를 보내주시겠다고 약속하셨습니다. 진리의 성령님은 우리를 모든 진리 가운데로 인도하십니다.","summary":"예수님께서 제자들을 떠나시며(승천) 보혜사를 보내주시겠다고 약속하셨습니다. 진리의 성령님은 우리를 모든 진리 가운데로 인도하십니다."},{"no":8,"file":"08_교회론_마지막_남은_구원의_방주.md","title":"교회론: 마지막 남은 구원의 방주","passage":"고린도전서 1:1-3, 에베소서 1:22-23 (개역개정)","verse":"","core":"사도 바울은 고린도에 있는 하나님의 교회에 편지하며, 그들을 그리스도 예수 안에서 거룩하여지고 성도라 부르심을 받은 자들이라고 불렀습니다.","summary":"사도 바울은 고린도에 있는 하나님의 교회에 편지하며, 그들을 그리스도 예수 안에서 거룩하여지고 성도라 부르심을 받은 자들이라고 불렀습니다."},{"no":9,"file":"09_종말론_내_인생의_종말이_찾아온다면.md","title":"종말론: 내 인생의 종말이 찾아온다면","passage":"누가복음 12:16-21, 29-31 (개역개정)","verse":"","core":"사람에게는 누구나 '개인적 종말', 즉 죽음이 있습니다. 우리는 세상의 욕심을 채우는 인생이 아닌, 인생의 끝을 준비하는 지혜로운 자가 되어야 합니다.","summary":"사람에게는 누구나 '개인적 종말', 즉 죽음이 있습니다. 우리는 세상의 욕심을 채우는 인생이 아닌, 인생의 끝을 준비하는 지혜로운 자가 되어야 합니다."},{"no":10,"file":"10_성품_왕의_자녀.md","title":"성품: 왕의 자녀","passage":"다니엘 1:8-21 (개역개정)","verse":"","core":"바벨론에 포로로 끌려간 다니엘은 하나님의 자녀로서 거룩성과 정체성을 지키기 위해 왕의 음식과 포도주를 거부하고, 하나님만 의지했습니다.","summary":"바벨론에 포로로 끌려간 다니엘은 하나님의 자녀로서 거룩성과 정체성을 지키기 위해 왕의 음식과 포도주를 거부하고, 하나님만 의지했습니다."},{"no":11,"file":"11_한국교회사특강_김제_금산교회_이야기.md","title":"한국교회사 특강: 김제 금산교회 이야기","passage":"마태복음 23:11-12, 마태복음 16:24-25 (개역개정)","verse":"","core":"김제 금산교회의 조덕삼 장로와 이자익 목사는 신분의 벽을 뛰어넘어 서로를 섬겼습니다. 자기를 낮추고 남을 섬긴 그들의 삶은, \"큰 자는 섬기는 자가 되라\"고 하신 예수님의 말씀이 한국교회 안에서 어떻게 살아 있었는지를 보여 줍니다.","summary":"김제 금산교회의 조덕삼 장로와 이자익 목사는 신분의 벽을 뛰어넘어 서로를 섬겼습니다. 자기를 낮추고 남을 섬긴 그들의 삶은, \"큰 자는 섬기는 자가 되라\"고 하신 예수님의 말씀이 한국교회 안에서 어떻게 살아 있었는지를 보여 줍니다."}]},{"q":3,"lessons":[{"no":1,"file":"01_족장_시대_선택_그_너머_이야기.md","title":"족장 시대: 선택, 그 너머 이야기","passage":"창세기 13:1-18, 39:7-9 (개역개정)","verse":"","core":"그리스도인은 다수가 선택하는 것을 따라가는 것이 아니라, 하나님의 말씀을 따라 선택해야 합니다. 하나님은 말씀이 선택의 기준이 된 사람을 세우고, 그 백성을 사용하십니다.","summary":"그리스도인은 다수가 선택하는 것을 따라가는 것이 아니라, 하나님의 말씀을 따라 선택해야 합니다. 하나님은 말씀이 선택의 기준이 된 사람을 세우고, 그 백성을 사용하십니다."},{"no":2,"file":"02_출애굽_시대_선택은_구별입니다.md","title":"출애굽 시대: 선택은 구별입니다","passage":"출애굽기 1-3장, 레위기 10-11장, 민수기 25장, 신명기 7·26·28·30장 (개역개정)","verse":"","core":"구원받은 성도는 하나님의 말씀을 따라 거룩한 삶의 모습을 가지고 살아가야 합니다. 선택받은 삶은 곧 구별된 삶이며, 구원받은 삶은 곧 거룩한 삶입니다.","summary":"구원받은 성도는 하나님의 말씀을 따라 거룩한 삶의 모습을 가지고 살아가야 합니다. 선택받은 삶은 곧 구별된 삶이며, 구원받은 삶은 곧 거룩한 삶입니다."},{"no":3,"file":"03_사사_시대_다른_기준_다른_선택_다른_세대.md","title":"사사 시대: 다른 기준, 다른 선택, 다른 세대","passage":"여호수아 13장, 사사기 2·17·19·21장 (개역개정)","verse":"","core":"그리스도인은 내가 아니라, 하나님의 말씀을 기준 삼고 살아가야 합니다. 기준의 차이가 곧 삶의 차이입니다.","summary":"그리스도인은 내가 아니라, 하나님의 말씀을 기준 삼고 살아가야 합니다. 기준의 차이가 곧 삶의 차이입니다."},{"no":4,"file":"04_통일_왕국_같은_상황_다른_선택.md","title":"통일 왕국: 같은 상황 다른 선택","passage":"사무엘상 11·15·24장, 열왕기상 3·11장 (개역개정)","verse":"","core":"그리스도인은 상황과 환경에 따라 선택을 달리하는 사람이 아닙니다. 언제나 진리인 하나님의 말씀을 믿고, 상황을 넘어서는 선택을 해야 합니다.","summary":"그리스도인은 상황과 환경에 따라 선택을 달리하는 사람이 아닙니다. 언제나 진리인 하나님의 말씀을 믿고, 상황을 넘어서는 선택을 해야 합니다."},{"no":5,"file":"05_분열_왕국_왕의_한_수_VS_왕의_악수.md","title":"분열 왕국: 왕의 한 수 VS. 왕의 악수","passage":"신명기 17장, 열왕기상 11-12장, 열왕기하 22-23장 (개역개정)","verse":"","core":"하나님이 원하시는 선택은 내 욕심과 생각이 아니라, 하나님의 말씀에 순종하는 삶입니다. 하나님은 말씀을 선택하고 순종한 사람을 통해 하나님 나라를 세워 가십니다.","summary":"하나님이 원하시는 선택은 내 욕심과 생각이 아니라, 하나님의 말씀에 순종하는 삶입니다. 하나님은 말씀을 선택하고 순종한 사람을 통해 하나님 나라를 세워 가십니다."},{"no":6,"file":"06_선지자1_포로전_시대_1대100.md","title":"선지자1(포로 전 시대): 1대100","passage":"이사야 6장, 예레미야 27-28장, 신명기 18장, 아모스 7장 (개역개정)","verse":"","core":"그리스도인은 자신의 생각과 뜻을 기준으로 삼는 사람이 아닙니다. 하나님의 말씀이 기준이 되어, 하나님이 원하시는 삶을 선택하는 것이 중요합니다.","summary":"그리스도인은 자신의 생각과 뜻을 기준으로 삼는 사람이 아닙니다. 하나님의 말씀이 기준이 되어, 하나님이 원하시는 삶을 선택하는 것이 중요합니다."},{"no":7,"file":"07_선지자2_포로기_시대_나를_포기하는_선택.md","title":"선지자2(포로기 시대): 나를 포기하는 선택","passage":"예레미야 23·33장, 에스겔 16·36장, 다니엘 1장, 이사야 11·26장 (개역개정)","verse":"","core":"하나님이 내 삶의 주인이 되실 때, 우리는 세상의 가치(사람들의 시선, 세상의 법칙과 진리)가 아니라 하나님의 가치를 선택합니다. 포로 된 백성은 하나님의 말씀으로 돌아가는 선택을 할 때 회복할 수 있습니다.","summary":"하나님이 내 삶의 주인이 되실 때, 우리는 세상의 가치(사람들의 시선, 세상의 법칙과 진리)가 아니라 하나님의 가치를 선택합니다. 포로 된 백성은 하나님의 말씀으로 돌아가는 선택을 할 때 회복할 수 있습니다."},{"no":8,"file":"08_선지서3_포로_귀환_선택받은_백성의_삶.md","title":"선지서3(포로 귀환): 선택받은 백성의 삶","passage":"에스라 1·3·7·9장, 느헤미야 1-2·9장, 학개 1-2장 (개역개정)","verse":"","core":"선택받은 백성은 세상 사람들과 다른 삶을 살아가야 합니다. 세상이 주인 되는 삶이 아니라, 나를 선택하신 하나님이 주인 되는 삶을 살아가야 합니다.","summary":"선택받은 백성은 세상 사람들과 다른 삶을 살아가야 합니다. 세상이 주인 되는 삶이 아니라, 나를 선택하신 하나님이 주인 되는 삶을 살아가야 합니다."},{"no":9,"file":"09_새_언약_언제나_동일한_선택.md","title":"새 언약: 언제나 동일한 선택","passage":"이사야 11·40·42·49장, 예레미야 11·31·32장, 에스겔 36장 (개역개정)","verse":"","core":"하나님은 배신한 백성을 외면하시지 않고, 예수 그리스도를 통해 새 언약을 맺으시며, 선택받은 백성이 회복할 수 있는 길을 준비하셨습니다.","summary":"하나님은 배신한 백성을 외면하시지 않고, 예수 그리스도를 통해 새 언약을 맺으시며, 선택받은 백성이 회복할 수 있는 길을 준비하셨습니다."},{"no":10,"file":"10_시가서_선택_찬양의_노래.md","title":"시가서: 선택, 찬양의 노래","passage":"잠언 1장, 시편 1편, 전도서 12장 (개역개정)","verse":"","core":"성경 속 찬양은 하나님이 지식의 근본이심을 노래합니다. 우리는 이 지식을 통해 바른 선택을 할 수 있습니다.","summary":"성경 속 찬양은 하나님이 지식의 근본이심을 노래합니다. 우리는 이 지식을 통해 바른 선택을 할 수 있습니다."},{"no":11,"file":"11_특강_구약의_이야기_선택.md","title":"특강: 구약의 이야기(선택)","passage":"구약 전체(개관) (개역개정)","verse":"","core":"구약은 구원을 위한 하나님의 선택과, 선택받은 백성이 어떻게 하나님의 백성으로 서 가는지를 이야기합니다. 우리 또한 그 역사의 흐름 속에 서서, 매일 하나님이 기뻐하시는 선택을 하도록 부름받았습니다.","summary":"구약은 구원을 위한 하나님의 선택과, 선택받은 백성이 어떻게 하나님의 백성으로 서 가는지를 이야기합니다. 우리 또한 그 역사의 흐름 속에 서서, 매일 하나님이 기뻐하시는 선택을 하도록 부름받았습니다."}]},{"q":4,"lessons":[{"no":1,"file":"01_공관복음_선택_새로운_시작.md","title":"공관복음: 선택, 새로운 시작","passage":"마태복음 4:17-20, 마가복음 1:16-28, 누가복음 5:1-11, 27-39 (개역개정)","verse":"","core":"예수님은 제자를 부르시고 선택하십니다. 참 제자는 예수님의 부르심에 반응하고 행동하는 사람입니다.","summary":"예수님은 제자를 부르시고 선택하십니다. 참 제자는 예수님의 부르심에 반응하고 행동하는 사람입니다."},{"no":2,"file":"02_요한복음_선택_예수님_혜택.md","title":"요한복음: 선택, 예수님 혜택","passage":"요한복음 1:1-49, 3:15-21, 5:24, 11:25-27 (개역개정)","verse":"","core":"하나님의 아들이신 예수님을 믿을 때 구원이 주어집니다. 구원받은 백성에게는 구원이 주는 유익(영원한 생명·하나님이 책임지시는 인생)이 있습니다.","summary":"하나님의 아들이신 예수님을 믿을 때 구원이 주어집니다. 구원받은 백성에게는 구원이 주는 유익(영원한 생명·하나님이 책임지시는 인생)이 있습니다."},{"no":3,"file":"03_사도행전_선택_복음의_길.md","title":"사도행전: 선택, 복음의 길","passage":"사도행전 1:8, 3:1-26, 6:2-3, 10:10-19 (개역개정)","verse":"","core":"그리스도인은 다른 것이 아니라 복음에 초점을 맞추는 사람이 되어야 합니다.","summary":"그리스도인은 다른 것이 아니라 복음에 초점을 맞추는 사람이 되어야 합니다."},{"no":4,"file":"04_로마서_갈라디아서_예수님이_주는_변화.md","title":"로마서·갈라디아서: 예수님이 주는 변화","passage":"로마서 1:17, 3:21-26, 5:12-19, 12:1-2 / 갈라디아서 2:16, 20 (개역개정)","verse":"","core":"인간은 예수 그리스도를 통해 죄인에서 하나님의 영광을 나타내는 새 삶을 살아갈 수 있습니다.","summary":"인간은 예수 그리스도를 통해 죄인에서 하나님의 영광을 나타내는 새 삶을 살아갈 수 있습니다."},{"no":5,"file":"05_목회서신_경건의_기준.md","title":"목회서신: 경건의 기준","passage":"디모데전서 3:16, 4:7-8, 6:11 / 디모데후서 1:9-11 / 디도서 2:11-14 (개역개정)","verse":"","core":"경건이란 그리스도의 진리(말씀)가 기준이 되어, 말씀대로 생각하고 행동하는 것입니다.","summary":"경건이란 그리스도의 진리(말씀)가 기준이 되어, 말씀대로 생각하고 행동하는 것입니다."},{"no":6,"file":"06_바울서신_사랑_파워.md","title":"바울서신: 사랑 파워","passage":"고린도전서 13:1-13 / 고린도후서 5:19 / 데살로니가전서 5:9 (개역개정)","verse":"","core":"그리스도인은 예수 그리스도의 '사랑'을 통해 연합되었고, 어떤 어려움 속에서도 그리스도의 사랑을 바라보며 거룩한 길을 걸어가야 합니다.","summary":"그리스도인은 예수 그리스도의 '사랑'을 통해 연합되었고, 어떤 어려움 속에서도 그리스도의 사랑을 바라보며 거룩한 길을 걸어가야 합니다."},{"no":7,"file":"07_옥중서신_성장_중.md","title":"옥중서신: 성장 중","passage":"골로새서 1:9-14, 28-29, 3:1-17 / 빌립보서 1:25 (개역개정)","verse":"","core":"복음으로 하나님의 자녀 된 그리스도인은, 날마다 성장하고 변화하는 삶을 살아가야 합니다.","summary":"복음으로 하나님의 자녀 된 그리스도인은, 날마다 성장하고 변화하는 삶을 살아가야 합니다."},{"no":8,"file":"08_일반서신1_청결과_정결.md","title":"일반서신1: 청결과 정결","passage":"히브리서 1:3, 9:11-10:19 / 야고보서 1:27, 2:14-26 / 베드로전서 1:13-2:3 (개역개정)","verse":"","core":"그리스도의 복음은 겉만 청결한 삶이 아니라, 말씀대로 사는 경건하고 정결한 삶을 살도록 합니다.","summary":"그리스도의 복음은 겉만 청결한 삶이 아니라, 말씀대로 사는 경건하고 정결한 삶을 살도록 합니다."},{"no":9,"file":"09_일반서신2_두_개의_삶.md","title":"일반서신2: 두 개의 삶","passage":"요한일서 2:9-11, 3:6-10, 4:7-21 / 요한이서 7 / 유다서 (개역개정)","verse":"","core":"그리스도인은 삶과 신앙이 분리된 사람이 아니라, 하나님의 사랑을 알기에 복음 안에서 삶과 신앙이 일치된 믿음을 가진 사람입니다.","summary":"그리스도인은 삶과 신앙이 분리된 사람이 아니라, 하나님의 사랑을 알기에 복음 안에서 삶과 신앙이 일치된 믿음을 가진 사람입니다."},{"no":10,"file":"10_요한계시록_선택의_마지막_결과.md","title":"요한계시록: 선택의 마지막 결과","passage":"요한계시록 1:1-19, 2:1-3:22 (개역개정)","verse":"","core":"세상의 고통 속에서도 진리를 선택하고 지키면 승리할 수 있습니다.","summary":"세상의 고통 속에서도 진리를 선택하고 지키면 승리할 수 있습니다."},{"no":11,"file":"11_특강_신약_그리스도인의_정체성.md","title":"특강: 신약 그리스도인의 정체성","passage":"신약 전체(개관) (개역개정)","verse":"","core":"그리스도인의 정체성을 부여하는 것은 성경입니다. 신약은 예수 그리스도를 통해 우리가 새로운 정체성을 부여받고, 새로운 방향과 목적을 가진 사람으로 살아가게 되는 과정을 이야기합니다.","summary":"그리스도인의 정체성을 부여하는 것은 성경입니다. 신약은 예수 그리스도를 통해 우리가 새로운 정체성을 부여받고, 새로운 방향과 목적을 가진 사람으로 살아가게 되는 과정을 이야기합니다."}]}]},{"year":3,"quarters":[{"q":1,"lessons":[{"no":1,"file":"01_창조.md","title":"창조","passage":"골로새서 1:15-20 (개역개정)","verse":"골로새서 1:16","core":"이 세상과 나는 우연히 생긴 게 아니에요. 보이는 것도 보이지 않는 것도 모두 예수님으로 말미암아, 예수님을 위하여 만들어졌어요. 그래서 세상에는 주인이 있고, 질서가 있고, 의미가 있어요.","summary":""},{"no":2,"file":"02_타락.md","title":"타락","passage":"창세기 3:1-7 (개역개정)","verse":"로마서 3:23","core":"죄는 단순히 '나쁜 짓'이 아니라, 하나님을 밀어내고 내가 내 인생의 주인이 되려는 거예요. 완벽했던 세상이 망가진 건 바로 그 한 가지, \"내가 하나님처럼 되겠다\"는 마음 때문이었어요.","summary":""},{"no":3,"file":"03_구속.md","title":"구속","passage":"고린도후서 5:17-21 (개역개정)","verse":"고린도후서 5:17","core":"죄로 망가진 우리를 하나님은 포기하지 않으셨어요. 예수님이 우리 자리에서 죄를 짊어지심으로, 누구든지 그분 안에 있으면 '새로운 피조물'이 돼요. 구속은 고치는 정도가 아니라, 아예 새로 만드시는 거예요.","summary":""},{"no":4,"file":"04_정치.md","title":"정치","passage":"사무엘상 8:4-9 (개역개정)","verse":"다니엘 2:21","core":"모든 권세의 주인은 하나님이시며, 지도자들은 하나님 앞에 책임지는 자리에 있어요. 그리스도인은 정치를 외면하지 않고, 하나님의 공의가 이 땅에서 이루어지도록 참여해요.","summary":""},{"no":5,"file":"05_경제.md","title":"경제","passage":"누가복음 12:15-21 (개역개정)","verse":"시편 24:1","core":"내가 가진 것의 주인은 하나님이세요. 더 많이 쌓는 것이 아니라 하나님이 맡기신 것을 어떻게 쓰느냐가 진짜 경제예요.","summary":""},{"no":6,"file":"06_교육.md","title":"교육","passage":"잠언 2:1-7 (개역개정)","verse":"잠언 9:10","core":"진짜 배움은 성적이 아니라 지혜에서 시작해요. 하나님을 경외하는 것이 모든 배움의 뿌리고, 그 지혜가 우리를 하나님과 이웃을 섬기는 사람으로 빚어가요.","summary":""},{"no":7,"file":"07_문화예술.md","title":"문화와 예술","passage":"시편 96:1-6 (개역개정)","verse":"시편 96:9","core":"아름다움은 우연이 아니라 하나님의 성품이에요. 우리가 만들고 즐기는 음악·영상·그림·글은 하나님의 창조성을 닮은 선물이에요. 크리스천은 문화를 도망치지도, 무비판으로 흡수하지도 않고, 그 안에서 진짜 아름다움을 분별하며 누려요.","summary":""},{"no":8,"file":"08_과학기술.md","title":"과학과 기술","passage":"잠언 8:22, 30-31 (개역개정)","verse":"잠언 8:30","core":"과학은 하나님이 창조 세계에 숨겨 놓으신 지혜를 발견하는 일이에요. 기술은 그 지혜로 세상을 돌보고 사람을 섬기는 도구예요. 도구 자체보다 그것을 쓰는 마음이 진짜 문제예요.","summary":""},{"no":9,"file":"09_환경.md","title":"환경","passage":"로마서 8:19-22 (개역개정)","verse":"로마서 8:21","core":"지금 지구가 겪는 고통은 단순한 '기술 문제'가 아니라, 인간의 죄가 만든 '영적 문제'예요. 하지만 성경은 이 세상이 끝내 버려지지 않고 하나님 안에서 회복된다고 말해요. 우리의 작은 돌봄은 그 회복의 미래를 미리 살아 내는 일이에요.","summary":""},{"no":10,"file":"10_미디어.md","title":"미디어","passage":"잠언 14:15 (개역개정)","verse":"잠언 14:15","core":"어리석은 자는 들리는 말을 다 믿어 버려요. 하지만 슬기로운 사람은 한 번 멈추고 분별해요. 미디어가 쏟아지는 시대에, '다 믿어 버리지 않는 것'이 바로 지혜예요.","summary":""},{"no":11,"file":"11_특강.md","title":"특강(종합)","passage":"베드로전서 2:9-12 (개역개정)","verse":"베드로전서 2:9","core":"우리는 선택된 족속, 왕 같은 제사장, 거룩한 나라예요. 하나님 나라 시민으로서 지금 이 학교, 이 동네, 이 시대에서 빛을 발하는 삶 — 그것이 1분기를 살아낸 우리의 소명이에요.","summary":""}]},{"q":2,"lessons":[{"no":1,"file":"01_가정.md","title":"가정: 하나님이 세우신 첫 번째 공동체","passage":"골로새서 3:18-21 (개역개정)","verse":"골로새서 3:20","core":"가정은 하나님이 가장 먼저 세우신 공동체예요(알고). 가장 가까워서 더 쉽게 상처 주는 그 자리가, 사실은 하나님 나라를 연습하는 첫 번째 자리예요(느끼고). 이번 주, 내가 먼저 한 사람에게 사랑과 순종을 행동으로 보여 줄 수 있어요(행하게).","summary":""},{"no":2,"file":"02_부모자녀.md","title":"부모·자녀: 은혜로 맺어진 관계","passage":"잠언 1:8-9 (개역개정)","verse":"잠언 1:8","core":"부모님의 가르침은 하나님이 우리에게 주신 선물이에요. 완벽한 부모는 없지만, 그 관계를 통해 하나님은 우리를 빚어가세요.","summary":""},{"no":3,"file":"03_형제자매.md","title":"형제자매: 함께 자라는 기쁨","passage":"창세기 45:1-15 (개역개정)","verse":"창세기 45:5","core":"형제자매 관계에서 상처도 나고 회복도 돼요. 요셉이 형들을 용서한 것처럼, 하나님은 우리 형제자매 관계를 통해서도 은혜를 일하세요.","summary":""},{"no":4,"file":"04_친구.md","title":"친구: 참된 우정이란","passage":"전도서 4:9-12 (개역개정)","verse":"전도서 4:12","core":"진짜 친구는 넘어질 때 일으켜 주고, 추울 때 따뜻하게 하고, 공격받을 때 함께 맞서 주는 사람이에요. 하나님은 우리에게 이런 우정을 주시기를 원하세요.","summary":""},{"no":5,"file":"05_교회.md","title":"교회: 하나님 나라의 전초기지","passage":"고린도전서 12:12-27 (개역개정)","verse":"고린도전서 12:27","core":"교회는 건물이 아니라 사람들이에요. 서로 다른 지체들이 그리스도 안에서 하나 된 몸 — 그것이 교회예요. 내가 그 몸의 한 지체예요.","summary":""},{"no":6,"file":"06_선생님제자.md","title":"선생님·제자: 가르침과 배움의 은혜","passage":"신명기 6:4-9 (개역개정)","verse":"신명기 6:7","core":"진짜 가르침은 교실에서만 이루어지지 않아요. 삶 속에서 함께 걸으며 전해지는 것 — 그것이 하나님이 원하시는 가르침이에요.","summary":""},{"no":7,"file":"07_이웃.md","title":"이웃: 보이지 않는 울타리를 넘어서","passage":"누가복음 6:27-36 (개역개정)","verse":"누가복음 6:31","core":"하나님 나라의 이웃 사랑은 나를 좋아하는 사람을 사랑하는 것을 넘어요. 내게 차갑거나 다른 사람까지 품는 것 — 그것이 하나님이 우리에게 보여주신 사랑이에요.","summary":""},{"no":8,"file":"08_갈등용서.md","title":"갈등과 용서: 화해의 사역자","passage":"마태복음 18:21-35 (개역개정)","verse":"마태복음 18:22","core":"용서는 한 번으로 끝나는 일이 아니에요. 하나님이 나를 용서하신 것처럼 — 일흔 번씩 일곱 번, 계속해서 용서하는 것이 하나님 나라 사람의 삶이에요.","summary":""},{"no":9,"file":"09_약한자강한자.md","title":"약한 자와 강한 자: 섬김의 리더십","passage":"마가복음 10:35-45 (개역개정)","verse":"마가복음 10:45","core":"하나님 나라에서 큰 사람은 섬기는 사람이에요. 강함은 지배가 아니라 섬김으로 쓸 때 하나님 나라의 방식이 돼요.","summary":""},{"no":10,"file":"10_다문화.md","title":"다문화: 하나님의 가족에 경계선은 없어요","passage":"사도행전 10:9-20, 34-35 (개역개정)","verse":"사도행전 10:34-35","core":"하나님은 어떤 민족이든, 어떤 나라 출신이든 차별하지 않으세요. 복음 앞에 높은 담은 없어요. 다문화 시대에 크리스천이 먼저 그 담을 허물어야 해요.","summary":""},{"no":11,"file":"11_종합.md","title":"특강(종합)","passage":"에베소서 4:1-6 (개역개정)","verse":"에베소서 4:3","core":"하나님 나라의 관계는 서로 다른 사람들이 하나 되는 기적이에요. 그 하나 됨이 세상에 하나님을 증거해요. 2분기를 살아온 우리는 그 기적의 현장으로 초대받았어요.","summary":""}]},{"q":3,"lessons":[{"no":1,"file":"01_겸손.md","title":"겸손: 낮아지는 것이 높아지는 길이에요","passage":"야고보서 4:6-10 (개역개정)","verse":"야고보서 4:10","core":"하나님은 교만한 자를 물리치시고 겸손한 자에게 은혜를 주세요. 낮아지는 것이 세상의 방식 같지만, 주 앞에서 낮추면 주께서 높이세요.","summary":""},{"no":2,"file":"02_감사.md","title":"감사: 형편이 아니라 하나님을 기억하는 것이에요","passage":"시편 103:1-5 (개역개정)","verse":"시편 103:2","core":"감사는 좋은 일이 생겼을 때 나오는 반응이 아니에요. 하나님이 베푸신 것을 기억할 때 나오는 고백이에요. 기억이 감사를 만들고, 감사가 삶을 바꿔요.","summary":""},{"no":3,"file":"03_인내.md","title":"인내: 포기하지 않는 힘이 어디서 오나요","passage":"로마서 5:3-5 (개역개정)","verse":"로마서 5:3-4","core":"환난은 인내를 만들고, 인내는 연단을 만들고, 연단은 소망을 만들어요. 하나님은 고통을 낭비하지 않으세요. 그 과정이 우리를 빚어요.","summary":""},{"no":4,"file":"04_용기.md","title":"용기: 두려움이 없는 게 아니에요","passage":"사무엘상 17:32-37, 45-47 (개역개정)","verse":"사무엘상 17:47","core":"용기는 두려움이 없는 상태가 아니에요. 두려움이 있는데도 하나님을 믿고 한 걸음 내딛는 것이에요. 다윗의 용기는 자신감이 아니라 하나님 신뢰에서 나왔어요.","summary":""},{"no":5,"file":"05_성실.md","title":"성실: 작은 일에 충성하는 것이 큰 일이에요","passage":"전도서 9:10 (개역개정)","verse":"전도서 9:10","core":"성실은 큰 무대에서만 보여주는 것이 아니에요. 아무도 보지 않을 때, 하기 싫을 때, 작은 일에서 최선을 다하는 것 — 그것이 하나님 앞에서의 성실이에요.","summary":""},{"no":6,"file":"06_긍휼.md","title":"긍휼: 멀리서 동정하는 게 아니에요","passage":"누가복음 15:11-24 (개역개정)","verse":"누가복음 15:20","core":"긍휼은 불쌍히 여기는 마음에서 끝나지 않아요. 아버지가 아들을 향해 달려간 것처럼, 긍휼은 움직이는 것이에요. 다가가는 것이에요.","summary":""},{"no":7,"file":"07_절제.md","title":"절제: 참는 게 아니라 다스리는 거예요","passage":"고린도전서 9:24-27 (개역개정)","verse":"고린도전서 9:25","core":"절제는 참는 것이 아니에요. 더 좋은 것을 위해 지금의 것을 내려놓는 훈련이에요. 운동선수가 금메달을 위해 훈련하듯, 우리는 썩지 않는 것을 위해 자신을 다스려요.","summary":""},{"no":8,"file":"08_기쁨.md","title":"기쁨: 상황이 아니라 하나님에게서 와요","passage":"하박국 3:17-18 (개역개정)","verse":"하박국 3:18","core":"진짜 기쁨은 상황이 좋을 때만 있는 감정이 아니에요. 무화과나무가 무성하지 않아도 여호와 안에서 기뻐하는 것 — 이것이 세상이 줄 수 없는 하나님의 기쁨이에요.","summary":""},{"no":9,"file":"09_평화.md","title":"평화: 세상이 줄 수 없는 평안이에요","passage":"요한복음 16:31-33 (개역개정)","verse":"요한복음 16:33","core":"예수님이 주시는 평안은 환경이 잔잔해져서 생기는 것이 아니에요. 세상을 이기신 분이 함께 계신다는 사실에서 오는 평안이에요. 환난 중에도 담대할 수 있어요.","summary":""},{"no":10,"file":"10_소망.md","title":"소망: 지금은 아니지만 반드시 올 것이에요","passage":"로마서 8:18-25 (개역개정)","verse":"로마서 8:18","core":"크리스천의 소망은 막연한 기대가 아니에요. 이미 결정된 미래를 향해, 지금 고통 속에서도 기다리는 것이에요. 그 소망이 현재의 고통을 버티게 해요.","summary":""},{"no":11,"file":"11_종합_성품.md","title":"특강(종합)","passage":"갈라디아서 5:16-26 (개역개정)","verse":"갈라디아서 5:22-23","core":"성령의 열매는 우리가 노력해서 만드는 게 아니에요. 성령 안에서 살 때 자연스럽게 맺어지는 것이에요. 3분기의 모든 성품은 내가 만드는 것이 아니라, 성령이 우리 안에서 기르시는 것이에요.","summary":""}]},{"q":4,"lessons":[{"no":1,"file":"01_부르심.md","title":"부르심: 나를 지명하여 부르신 하나님","passage":"이사야 43:1-7 (개역개정)","verse":"이사야 43:1","core":"하나님은 나를 만드셨고, 구속하셨고, 지명하여 부르셨어요. 내가 어디에 있든지, 어떤 상황이든지 — \"너는 내 것이라\"는 부르심이 내 정체성의 뿌리예요.","summary":""},{"no":2,"file":"02_은사.md","title":"은사: 내 재능이 아니에요, 하나님의 선물이에요","passage":"베드로전서 4:10-11 (개역개정)","verse":"베드로전서 4:10","core":"내가 잘하는 것은 내 것이 아니에요. 하나님의 여러 가지 은혜를 맡은 선한 청지기로서, 그 은사를 세상을 위해 써야 해요.","summary":""},{"no":3,"file":"03_기도.md","title":"기도: 하나님과 나누는 대화예요","passage":"야고보서 5:13-18 (개역개정)","verse":"야고보서 5:16","core":"기도는 종교적 의식이 아니에요. 하나님과 나누는 살아있는 대화예요. 의인의 간구는 역사하는 힘이 크다는 것을 — 기도를 통해 직접 경험할 수 있어요.","summary":""},{"no":4,"file":"04_전도.md","title":"전도: \"와 보라\" — 내 이야기로 시작해요","passage":"요한복음 4:28-42 (개역개정)","verse":"요한복음 4:29","core":"전도는 완벽한 말을 준비하는 게 아니에요. 사마리아 여인처럼 \"와 보라\"고 초대하는 것이에요. 내가 예수님을 만난 것을 솔직하게 나누는 것이 전도의 시작이에요.","summary":""},{"no":5,"file":"05_선교.md","title":"선교: 땅 끝까지 가는 하나님의 마음이에요","passage":"마태복음 28:18-20 (개역개정)","verse":"마태복음 28:19","core":"선교는 특별한 사람이 머나먼 곳으로 가는 것만이 아니에요. 내가 있는 자리에서 \"모든 민족을 제자로 삼으라\"는 명령을 살아내는 것이에요.","summary":""},{"no":6,"file":"06_헌신.md","title":"헌신: 날마다 자기를 부인하는 것이에요","passage":"누가복음 9:23-24 (개역개정)","verse":"누가복음 9:23","core":"헌신은 한 번의 결단으로 끝나는 이벤트가 아니에요. 날마다 자기를 부인하고, 날마다 제 십자가를 지고, 날마다 예수님을 따르는 것이에요.","summary":""},{"no":7,"file":"07_고난.md","title":"고난: 기뻐할 수 있어요, 이상하게 들려도","passage":"야고보서 1:2-4 (개역개정)","verse":"야고보서 1:3-4","core":"시험을 만날 때 기뻐하라는 것은 고통을 무시하는 게 아니에요. 고통이 인내를 낳고, 인내가 온전함을 낳는다는 것을 알 때 — 고난도 하나님의 손 안에 있어요.","summary":""},{"no":8,"file":"08_증거.md","title":"증거: 내 삶이 하나님의 이야기예요","passage":"마가복음 5:18-20 (개역개정)","verse":"마가복음 5:19","core":"증거는 신학 논쟁이 아니에요. 예수님이 나에게 하신 일을 전하는 것이에요. 내 이야기가 누군가의 삶을 바꿀 수 있어요.","summary":""},{"no":9,"file":"09_소망.md","title":"소망: 부활이 내 이야기예요","passage":"요한복음 11:25-26 (개역개정)","verse":"요한복음 11:25-26","core":"\"나는 부활이요 생명이니.\" 이 말씀은 예수님이 나에게 하시는 말씀이에요. 죽음도 끝이 아니에요. 예수님을 믿는 자는 죽어도 살고, 살아서 믿는 자는 영원히 죽지 않아요.","summary":""},{"no":10,"file":"10_공동체.md","title":"공동체: 모이기를 포기하지 말아요","passage":"히브리서 10:24-25 (개역개정)","verse":"히브리서 10:24-25","core":"공동체는 선택 사항이 아니에요. \"모이기를 폐하지 말라\"는 명령이에요. 혼자서는 사명을 완수할 수 없어요. 서로 격려하며 함께 달리는 것이 하나님의 방식이에요.","summary":""},{"no":11,"file":"11_졸업.md","title":"특강(종합)","passage":"디모데후서 4:6-8 (개역개정)","verse":"디모데후서 4:7","core":"졸업은 끝이 아니에요. \"선한 싸움을 싸우고 달려갈 길을 마치고 믿음을 지켰다\"는 말은, 이제 더 넓은 사명의 자리로 나아가는 사람에게 주어지는 말씀이에요. 3년을 달려온 여러분에게, 그 출발점이 여기 있어요.","summary":""}]}]}]},{"name":"고등부","years":[{"year":1,"quarters":[{"q":1,"lessons":[{"no":1,"file":"01_관점1_행동의_이면에_있는_관점.md","title":"행동의 이면에 있는 관점(틀) ①","passage":"(본 과는 성경 본문 없이 이론 학습)","verse":"","core":"말이나 행동의 이면에, 그렇게 말하고 행동하는 관점(틀)이 있습니다","summary":"누군가가 어떤 행동을 할 때는 그런 행동을 하는 이유가 있습니다. 이것을 '관점(틀)', 혹은 '세계관'이라고 합니다."},{"no":2,"file":"02_관점2_행동의_이면에_있는_관점.md","title":"행동의 이면에 있는 관점(틀) ②","passage":"요한복음 12:1-8 (개역개정)","verse":"빌립보서 4:6-7 (과 내 핵심 구절 재사용)","core":"드러나는 행동보다 그 행동을 만드는 관점(틀)이 훨씬 더 중요합니다","summary":"어떤 사람의 행동은 드러난 행동만으로 모두 설명되지 않습니다. 그런 행동을 하게 된 이유가 있기 때문입니다."},{"no":3,"file":"03_사실1_관점에_따라_달라지는_사실.md","title":"관점에 따라 달라지는 사실 ①","passage":"(본 과는 성경 본문 없이 이론 학습)","verse":"","core":"관점(틀)에 따라서 사실이 달라질 수 있습니다","summary":"관점(틀)은 어떤 사건을 있는 그대로 보게 하지 않고, 다시 해석하게 합니다."},{"no":4,"file":"04_사실2_관점에_따라_달라지는_사실.md","title":"관점에 따라 달라지는 사실 ②","passage":"사무엘하 6:12-23 (개역개정)","verse":"사무엘하 6:21 (과 내 핵심 구절 재사용)","core":"동일한 사건도 각자의 관점(틀)에 따라 전혀 다르게 평가됩니다","summary":"법궤 앞에서 춤춘 다윗의 한 행동을, 다윗은 \"여호와 앞에서 한 것\"으로, 미갈은 부끄러운 것으로 평가했습니다."},{"no":5,"file":"05_전제1_모든_주장의_배경에_있는_전제.md","title":"모든 주장의 배경에 있는 전제(믿음, 신념) ①","passage":"(본 과는 성경 본문 없이 지식·믿음 학습)","verse":"","core":"믿음(신념)은 거의 모든 이해의 토대(기초)입니다","summary":"이해하고 확인하고 믿는 것이 아니라, 사람은 출생부터 믿음을 붙잡고 살고, 그 믿음으로 평생을 삽니다."},{"no":6,"file":"06_전제2_모든_주장의_배경에_있는_전제.md","title":"모든 주장의 배경에 있는 전제(믿음, 신념) ②","passage":"창세기 3:4-6 (개역개정) 외 인용: 요 20:29, 창 8:21, 렘 17:9, 롬 3:10-12, 히 4:12, 고후 10:5, 빌 4:6-7","verse":"히브리서 4:12 (과 내 핵심 구절 재사용)","core":"진리는 우리의 믿음 여부와 무관하게 진리이며, 말씀으로 새로워진 생각만이 유익한 결과를 만듭니다","summary":"사람의 생각은 자기중심적이어서 믿을 수 없고, 성경 말씀을 토대로 생각할 때만 올바르게 됩니다."},{"no":7,"file":"07_차이1_다르다_vs_틀리다.md","title":"일반적 세계관과 성경적 세계관의 차이: 다르다 vs 틀리다 ①","passage":"(본 과는 성경 본문 없이 개념 학습)","verse":"","core":"기독 청소년에게 성경의 가르침과 다르면 틀린 것이고, 하나님의 말씀 외에 모든 것은 다름입니다","summary":"'틀리다'는 동일한 기준이 있을 때, '다르다'는 기준이 서로 다를 때 사용합니다. 크리스천에게 그 절대 기준은 성경입니다."},{"no":8,"file":"08_차이2_다르다_vs_틀리다.md","title":"일반적 세계관과 성경적 세계관의 차이: 다르다 vs 틀리다 ②","passage":"열왕기하 5장(왕하 5:11), 사도행전 16:6-10 (개역개정)","verse":"히브리서 4:12 (과 내 핵심 구절 재사용)","core":"성경적 세계관은 다름이 아니라, 옳고 그름으로 접근합니다","summary":"하나님의 말씀을 자신의 생각으로 판단한 나아만과, 옳고 그름으로 받아들여 순종한 사도 바울을 대조합니다."},{"no":9,"file":"09_핵심_창조_타락_구속.md","title":"성경적 세계관의 핵심: 창조-타락-구속","passage":"(참조: 딤전 4:4-5, 창 3:17)","verse":"","core":"하나님이 세상을 선하게 창조하셨고, 사람의 죄로 창조 세계 전체가 타락했으며, 예수님의 구속으로 창조 세계가 회복되었습니다","summary":"창조, 타락, 구속의 성경적 세계관의 핵심은 '생명'입니다."},{"no":10,"file":"10_실제_삶이_있는_신앙.md","title":"성경적 세계관의 실제: '삶이 있는 신앙'","passage":"야고보서 1:26-27 (개역개정)","verse":"야고보서 1:26-27 (과 내 핵심 구절 재사용)","core":"삶이 있는 신앙이란 신앙이 생활 속에 스며 있는 것을 의미합니다","summary":"세상에서 빛(구별)과 소금(희생과 섬김)의 삶이 '삶이 있는 신앙'입니다."},{"no":11,"file":"11_특강_세계관에_기초한_설교.md","title":"특강: 세계관에 기초한 설교","passage":"열왕기하 6:14-17 (개역개정) <!-- 감수: 설교가 \"14절\"로 인용하는 본문(\"하나님의 사람의 사환이 일찍이 일어나서…\")은 개역개정 기준 왕하 6:15에 해당하는 것으로 보임. 원전 표기 그대로 보존 — 확인 필요 -->","verse":"","core":"환경이 아니라 그 환경을 바라보는 시각이 삶을 결정합니다","summary":"누군가가 어떤 행동을 할 때는 그런 행동을 하는 이유가 있습니다. 특강에서는 성경 말씀을 통하여 세계관에 기초한 메시지를 듣게 됩니다."}]},{"q":2,"lessons":[{"no":1,"file":"01_창조.md","title":"창조","passage":"창세기 1:26-28 (개역개정)","verse":"창세기 1:28","core":"하나님이 우주 만물을 만드시고, 당신의 형상인 사람에게 그것을 정복하고 다스리라고 말씀하셨다.","summary":""},{"no":2,"file":"02_타락.md","title":"타락","passage":"창세기 3:1-6 (개역개정)","verse":"","core":"하나님 말씀에 대한 불순종의 결과로 인간에게 죽음과 고통이 찾아왔습니다.","summary":""},{"no":3,"file":"03_구속.md","title":"구속","passage":"마태복음 26:36-46 (개역개정)","verse":"로마서 5:19","core":"하나님 말씀에 대한 예수님의 순종으로 인간에게 새 생명과 아름다운 미래가 시작되었습니다.","summary":""},{"no":4,"file":"04_진리.md","title":"진리","passage":"신명기 11:18-20 (개역개정)","verse":"","core":"예수님이 말씀이며 또한 진리입니다. 그러므로 예수님의 말씀인 성경은 올바른 삶과 참된 축복의 기준입니다.","summary":""},{"no":5,"file":"05_말씀.md","title":"말씀","passage":"요한복음 1:1-18 (개역개정)","verse":"요한복음 1:1","core":"하나님이 말씀(말씀 = 하나님 = 예수님)으로 세상을 만드셨습니다.","summary":""},{"no":6,"file":"06_말씀으로_준비하기.md","title":"말씀으로 준비하기","passage":"갈라디아서 1:11-17 (개역개정)","verse":"","core":"복음을 경험한 바울은 이전에 가치 있다고 여기던 것들을 버리고, 철저하게 말씀을 기초로 자신을 세워 갑니다.","summary":""},{"no":7,"file":"07_말씀으로_세워지기.md","title":"말씀으로 세워지기","passage":"사도행전 4:1-21 (개역개정)","verse":"사도행전 4:19-20","core":"예수님을 만난 사람은 세상의 힘에 비굴해지지 않습니다.","summary":""},{"no":8,"file":"08_말씀으로_승리하기.md","title":"말씀으로 승리하기","passage":"사도행전 16:6-10 (개역개정)","verse":"","core":"기독 청소년은 자신의 비전으로 하나님을 설득하는 것이 아니라, 하나님의 말씀을 기초로 비전을 세워야 합니다.","summary":""},{"no":9,"file":"09_말
